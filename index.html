const TARGET = 6000;

const CARDS = [
  { id:'bonus200',  label:'Bonus 200',  emoji:'🎁', color:'#b45309' },
  { id:'bonus300',  label:'Bonus 300',  emoji:'🎁', color:'#b45309' },

  { id:'bonus500',  label:'Bonus 500',  emoji:'🎁', color:'#92400e' },
  { id:'bonus600',  label:'Bonus 600',  emoji:'🎁', color:'#92400e' },
  { id:'x2',        label:'×2',         emoji:'✖',  color:'#7c3aed' },
  { id:'stop',      label:'Stop',       emoji:'🛑', color:'#6b7280' },
  { id:'feuerwerk', label:'Feuerwerk',  emoji:'🎆', color:'#dc2626' },
  { id:'plusminus', label:'Plus/Minus', emoji:'⊕',  color:'#0284c7' },
  { id:'kleeblatt', label:'Kleeblatt',  emoji:'🍀', color:'#16a34a' },
  { id:'strasse',   label:'Straße',     emoji:'🛣',  color:'#d97706' },
];

const C = {
  bg:'#0e0900', surface:'#1c1200', surface2:'#281a00', border:'#3d2800',
  text:'#fff8e6', muted:'#a08040', muted2:'#5a4020',
  amber:'#f59e0b', amberL:'#fde68a',
  red:'#ef4444', green:'#22c55e',
};
const PC  = ['#f59e0b','#ef4444','#10b981','#818cf8','#f97316','#e879f9','#38bdf8'];
const PCL = ['#fde68a','#fca5a5','#6ee7b7','#c7d2fe','#fed7aa','#f5d0fe','#bae6fd'];

// ═══ HELPERS ═════════════════════════════════════════════════════════════════

const total  = p   => p.turns.reduce((s,t) => s+t.score, 0);
const ls     = (k,d) => { try{const v=localStorage.getItem(k); return v?JSON.parse(v):d;}catch{return d;} };
const lsSet  = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v));}catch{} };
const lsDel  = k     => { try{localStorage.removeItem(k);}catch{} };
const pColor = (name,roster,light=false) => { const i=roster.indexOf(name); return (light?PCL:PC)[i%PC.length]; };
const avg    = arr   => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;
const fmtN   = n     => n.toLocaleString('de-DE');

const isOver = game => {
  if (!game?.players?.length) return false;
  if (game.players.some(p=>p.turns.some(t=>t.instant))) return true;
  const tots  = game.players.map(total);
  const turns = game.players.map(p=>p.turns.length);
  return tots.some(t=>t>=TARGET) && turns.every(t=>t===turns[0]) && turns[0]>0;
};

const getWinner = game => {
  const instant = game.players.find(p=>p.turns.some(t=>t.instant));
  if (instant) return instant.name;
  const tots = game.players.map(p=>({name:p.name,t:total(p)}));
  const max  = Math.max(...tots.map(t=>t.t));
  const w    = tots.filter(t=>t.t===max);
  return w.length===1 ? w[0].name : w.map(p=>p.name).join(' & ');
};

// ═══ GITHUB SYNC ═════════════════════════════════════════════════════════════

const GH_FILE = 'tuttodata.json';
const ghH = t => ({ Authorization:`token ${t}`, Accept:'application/vnd.github.v3+json' });
async function ghRead(cfg) {
  const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${GH_FILE}`,{headers:ghH(cfg.token)});
  if (r.status===404) return {data:null,sha:null};
  if (!r.ok) throw new Error(`GitHub ${r.status}`);
  const j = await r.json();
  return {data:JSON.parse(atob(j.content.replace(/\n/g,''))),sha:j.sha};
}
async function ghWrite(cfg,data,sha) {
  const body={message:'Tutto update',content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))))};
  if (sha) body.sha=sha;
  const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${GH_FILE}`,
    {method:'PUT',headers:{...ghH(cfg.token),'Content-Type':'application/json'},body:JSON.stringify(body)});
  if (!r.ok) throw new Error(`GitHub ${r.status}`);
  return (await r.json()).content.sha;
}
function mergeData(local,remote) {
  const games=[...(remote.games||[])];
  const ids=new Set(games.map(g=>g.id));
  for(const g of (local.games||[])) if(!ids.has(g.id)){games.push(g);ids.add(g.id);}
  const roster=[...new Set([...(remote.roster||[]),...(local.roster||[])])];
  return {games:games.sort((a,b)=>a.id.localeCompare(b.id)),roster};
}

// ═══ SHARED COMPONENTS ═══════════════════════════════════════════════════════

// ═══ APP ═════════════════════════════════════════════════════════════════════

function App() {
  const [screen, setScreen] = useState('home');
  const [games,  setGames]  = useState(()=>ls('tt:games',[]));
  const [cur,    setCur]    = useState(()=>ls('tt:current',null));
  const [roster, setRoster] = useState(()=>ls('tt:roster',[]));
  const [modal,  setModal]  = useState(false);
  const [stab,   setStab]   = useState('leaderboard');
  const [sPl,    setSPl]    = useState(null);
  const [sCmp,   setSCmp]   = useState([null,null]);
  const [ghCfg,  setGhCfg]  = useState(()=>ls('tt:gh',null));
  const [syncSt, setSyncSt] = useState('idle');
  const [syncMsg,setSyncMsg]= useState('');

  useEffect(()=>{
    if (roster.length===0) setScreen('setup');
    else if (ghCfg?.token) doSync();
  },[]);

  const doSync = async cfg => {
    const c=cfg||ghCfg; if(!c?.token) return;
    setSyncSt('syncing');
    try {
      const {data,sha}=await ghRead(c);
      if (data) {
        const m=mergeData({games:ls('tt:games',[]),roster:ls('tt:roster',[])},data);
        setGames(m.games); lsSet('tt:games',m.games);
        setRoster(m.roster); lsSet('tt:roster',m.roster);
        lsSet('tt:gh_sha',sha);
      }
      setSyncSt('ok'); setSyncMsg(new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}));
    } catch(e){setSyncSt('error');setSyncMsg(e.message);}
  };

  const pushGh = async(g,r) => {
    const c=ghCfg; if(!c?.token) return;
    setSyncSt('syncing');
    try {
      const {sha}=await ghRead(c);
      const ns=await ghWrite(c,{version:1,roster:r,games:g},sha);
      lsSet('tt:gh_sha',ns);
      setSyncSt('ok'); setSyncMsg(new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}));
    } catch(e){setSyncSt('error');setSyncMsg(e.message);}
  };

  const saveGames  = (g,r) => { setGames(g);  lsSet('tt:games',g);  pushGh(g,r||roster); };
  const saveRoster = r     => { setRoster(r); lsSet('tt:roster',r); };
  const saveCur    = g     => { setCur(g); g ? lsSet('tt:current',g) : lsDel('tt:current'); };

  const startGame = players => {
    const nr=[...new Set([...roster,...players])];
    saveRoster(nr);
    saveCur({id:Date.now().toString(), date:new Date().toLocaleDateString('de-DE'),
      players:players.map(name=>({name,turns:[]})), currentPlayerIdx:0});
    setScreen('game');
  };

  const recordTurn = (turnData, deductNames=[]) => {
    if (!cur) return;
    let np = cur.players.map((p,i) =>
      i===cur.currentPlayerIdx ? {...p, turns:[...p.turns, turnData]} : p
    );
    for (const name of deductNames) {
      const pTot = np.find(p=>p.name===name)?.turns.reduce((s,t)=>s+t.score, 0) ?? 0;
      const actual = Math.min(1000, Math.max(0, pTot));
      if (actual > 0) {
        np = np.map(p => p.name===name
          ? {...p, turns:[...p.turns, {score:-actual, bust:false, tuttoCycles:0, card:'plusminus_abzug', isDeduction:true}]}
          : p);
      }
    }
    saveCur({...cur, players:np, currentPlayerIdx:(cur.currentPlayerIdx+1)%cur.players.length});
    setModal(false);
  };

  const finishGame = () => {
    if (!cur) return;
    const winner = getWinner(cur);
    saveGames([...games,{...cur,winner,finished:true}], roster);
    saveCur(null);
    setScreen('home');
  };

  const undoLastTurn = () => {
    if (!cur || !confirm('Letzten Zug wirklich rückgängig machen?')) return;
    const np = [...cur.players];
    const prevIdx = (cur.currentPlayerIdx - 1 + cur.players.length) % cur.players.length;
    if(np[prevIdx].turns.length > 0) {
      np[prevIdx].turns.pop();
      saveCur({...cur, players:np, currentPlayerIdx:prevIdx});
    }
  };

  const abortGame = () => {
    if(confirm('Möchtest du das aktuelle Spiel wirklich abbrechen und löschen?')) {
      saveCur(null);
      setScreen('home');
    }
  };

  // Lösch-Funktion für vergangene Spiele
  const deleteGame = (id) => {
    if(confirm('Möchtest du dieses Spiel wirklich unwiderruflich aus der Historie löschen?')) {
      const newGames = games.filter(g => g.id !== id);
      saveGames(newGames, roster);
      // Falls das gelöschte Spiel gerade in der Progress-Ansicht ausgewählt war, setzen wir das zurück
      if (sPl) setSPl(null); 
    }
  };

  const syncBadge = html`<span style=${{fontSize:11,color:syncSt==='ok'?C.green:syncSt==='error'?C.red:C.muted}}>
    ${syncSt==='syncing'?'↻ Sync…':syncSt==='ok'?`☁ ${syncMsg}`:syncSt==='error'?'⚠ Sync-Fehler':''}
  </span>`;

  return html`<div style=${{minHeight:'100vh',background:C.bg,color:C.text}}>
    ${screen==='home'  && html`<${Home}      ...${{games,roster,cur,syncBadge,onNew:()=>setScreen('setup'),onContinue:()=>setScreen('game'),onStats:()=>setScreen('stats'),onGh:()=>setScreen('gh')}}/>`}
    ${screen==='setup' && html`<${GameSetup} roster=${roster} onStart=${startGame} onBack=${()=>setScreen('home')}/>`}
    ${screen==='game' && cur && html`
      <${Game} ...${{game:cur,roster,onTurn:()=>setModal(true),onFinish:finishGame,onUndo:undoLastTurn,onAbort:abortGame,onBack:()=>setScreen('home')}}/>
      ${modal && html`<${TurnModal} ...${{game:cur,roster,onRecord:recordTurn,onClose:()=>setModal(false)}}/>`}
    `}
    ${screen==='stats' && html`<${Stats} ...${{games,roster,tab:stab,setTab:setStab,selPlayer:sPl,setSelPlayer:setSPl,cmp:sCmp,setCmp:setSCmp,onBack:()=>setScreen('home'), onDeleteGame:deleteGame}}/>`}
    ${screen==='gh'    && html`<${GhSettings} initial=${ghCfg} onSave=${cfg=>{setGhCfg(cfg);lsSet('tt:gh',cfg);if(cfg)doSync(cfg);setScreen('home');}} onBack=${()=>setScreen('home')}/>`}
  </div>`;
}

// ═══ HOME ════════════════════════════════════════════════════════════════════

function Home({games,roster,cur,syncBadge,onNew,onContinue,onStats,onGh}) {
  const recent=[...games].reverse().slice(0,5);

    <div style=${{textAlign:'center',padding:'44px 0 26px'}}>
      <div style=${{fontSize:52,fontWeight:900,letterSpacing:-2,fontStyle:'italic',

        TUTTO
      </div>
      <div style=${{fontSize:12,color:C.muted,marginTop:2,letterSpacing:2,textTransform:'uppercase'}}>Digitaler Spielblock</div>
      <div style=${{marginTop:6}}>${syncBadge}</div>
    </div>

    <div style=${{display:'flex',flexDirection:'column',gap:10}}>
      ${cur && html`<${Btn} onClick=${onContinue} bg=${C.amber} dark=${true}>▶ Spiel fortsetzen</${Btn}>`}
      <${Btn} onClick=${onNew}   bg=${C.surface2} border=${C.border}>+ Neues Spiel</${Btn}>
      <${Btn} onClick=${onStats} bg=${C.surface2} border=${C.border}>
        📊 Statistiken <span style=${{fontSize:12,color:C.muted,marginLeft:4}}>${games.length} Spiele</span>
      </${Btn}>
    </div>

    <div style=${{display:'flex',justifyContent:'center',marginTop:12}}>
      <button onClick=${onGh} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:13}}>☁ GitHub Sync</button>
    </div>

    ${recent.length>0 && html`<div style=${{marginTop:28}}>
      <div style=${{fontSize:11,color:C.muted2,letterSpacing:2,textTransform:'uppercase',marginBottom:10,fontWeight:700}}>Letzte Spiele</div>
      ${recent.map(g=>{
        const tots=g.players.map(p=>total(p));
        const maxT=Math.max(...tots);
        const rounds=Math.max(...g.players.map(p=>p.turns.length),0);
        return html`<div key=${g.id} style=${{padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
          <div style=${{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style=${{color:C.muted,fontSize:12}}>${g.date}</span>
            <span style=${{color:C.muted2,fontSize:11}}>${g.players.length} Spieler · ${rounds} Runden</span>
          </div>
          <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
            ${g.players.map((p,i)=>html`<span key=${i} style=${{fontSize:13,color:tots[i]===maxT?PCL[i%PC.length]:C.muted}}>
              ${p.name}: <strong>${fmtN(tots[i])}</strong>
            </span>`)}
          </div>
          ${g.winner && html`<div style=${{fontSize:11,color:C.amber,marginTop:3}}>🏆 ${g.winner}</div>`}
        </div>`;
      })}
    </div>`}

    <div style=${{marginTop:24,padding:'12px',background:C.surface,borderRadius:12,fontSize:11,color:C.muted,lineHeight:1.7}}>
      <strong style=${{color:C.text}}>Punkte:</strong> ⚄=50 · ⚀=100 · Drillinge: 2×200, 3×300, 4×400, 5×500, 6×600, 1×1000 · Straße=2000 · Ziel: 6.000
    </div>
  </div>`;
}

// ═══ GAME SETUP ══════════════════════════════════════════════════════════════

function GameSetup({roster,onStart,onBack}) {
  const [selected,setSelected] = useState([]);
  const [newName, setNewName]  = useState('');

  const toggle = name => {
    if (selected.includes(name)) setSelected(selected.filter(n=>n!==name));
    else if (selected.length<8) setSelected([...selected,name]);
  };
  const addNew = () => {
    const n=newName.trim(); if(!n||selected.length>=8) return;
    if (!selected.includes(n)) setSelected([...selected,n]);
    setNewName('');
  };

  return html`<div style=${{maxWidth:460,margin:'0 auto',padding:'20px 16px 40px'}}>
    <div style=${{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
      ${roster.length>0 && html`<button onClick=${onBack} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20,padding:0}}>‹</button>`}
      <span style=${{fontSize:22,fontWeight:800}}>Neues Spiel</span>
    </div>

    ${selected.length>0 && html`<div style=${{marginBottom:20}}>
      <div style=${{fontSize:11,color:C.muted2,letterSpacing:2,textTransform:'uppercase',marginBottom:8,fontWeight:700}}>Ausgewählt (${selected.length}/8)</div>
      <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
        ${selected.map((n,i)=>html`<div key=${n} style=${{display:'flex',alignItems:'center',gap:6,background:C.surface2,
          border:`2px solid ${PC[i%PC.length]}`,borderRadius:20,padding:'6px 12px'}}>
          <span style=${{color:PC[i%PC.length],fontWeight:700,fontSize:12}}>${i+1}</span>
          <span style=${{fontSize:13}}>${n}</span>
          <button onClick=${()=>toggle(n)} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:14,padding:'0 0 0 4px'}}>×</button>
        </div>`)}
      </div>
    </div>`}

    ${roster.length>0 && html`<div style=${{marginBottom:20}}>
      <div style=${{fontSize:11,color:C.muted2,letterSpacing:2,textTransform:'uppercase',marginBottom:8,fontWeight:700}}>Bekannte Spieler</div>
      <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
        ${roster.map(n=>{
          const idx=selected.indexOf(n);
          const sel=idx>=0;
          return html`<button key=${n} onClick=${()=>toggle(n)} style=${{
            background:sel?C.surface2:C.surface,border:`2px solid ${sel?PC[idx%PC.length]:C.border}`,
            borderRadius:20,padding:'7px 14px',color:sel?PC[idx%PC.length]:C.muted,cursor:'pointer',
            fontSize:13,fontWeight:sel?700:400}}>${n}</button>`;
        })}
      </div>
    </div>`}

    <div style=${{marginBottom:24}}>
      <div style=${{fontSize:11,color:C.muted2,letterSpacing:2,textTransform:'uppercase',marginBottom:8,fontWeight:700}}>Neuer Spieler</div>
      <div style=${{display:'flex',gap:8}}>
        <input value=${newName} onChange=${e=>setNewName(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&addNew()}
          placeholder="Name eingeben…" maxLength="15"
          style=${{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:'11px 14px',
            color:C.text,fontSize:14,outline:'none'}}/>
        <button onClick=${addNew} disabled=${!newName.trim()||selected.length>=8} style=${{
          background:C.surface2,border:`1px solid ${C.border}`,borderRadius:12,padding:'0 16px',color:C.text,
          fontWeight:700,cursor:'pointer',opacity:(!newName.trim()||selected.length>=8)?0.4:1}}>+</button>
      </div>
    </div>

    <${Btn} onClick=${()=>onStart(selected)} disabled=${selected.length<2} bg=${C.green} dark=${true}>
      Spiel starten
    </${Btn}>
  </div>`;
}

// ═══ GAME UI (TABELLEN PRO SPIELERIN) ════════════════════════════════════════

function Game({game, roster, onTurn, onFinish, onUndo, onAbort, onBack}) {
  const over = isOver(game);
  const cp   = game.players[game.currentPlayerIdx];
  const maxT = Math.max(...game.players.map(total));
  const diff = maxT - total(cp);

  const totalRounds = Math.max(...game.players.map(p => p.turns.length), 0);

  return html`<div style=${{maxWidth:460,margin:'0 auto',display:'flex',flexDirection:'column',height:'100vh'}}>
    <div style=${{padding:'16px 16px 12px',background:C.bg,borderBottom:`1px solid ${C.border}`,zIndex:10}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <button onClick=${onBack} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:14}}>‹ Menü</button>
        <div style=${{color:C.amber,fontWeight:800,fontSize:14,letterSpacing:1}}>${TARGET.toLocaleString('de-DE')} ZIEL</div>
      </div>
      
      <div style=${{display:'flex',gap:8,overflowX:'auto',paddingBottom:8,scrollbarWidth:'none'}}>
        ${game.players.map((p,i)=>{
          const active=i===game.currentPlayerIdx;
          const tot=total(p);
          const c=PCL[i%PC.length];
          return html`<div key=${p.name} style=${{
            flex:'0 0 auto',background:active?`${PC[i%PC.length]}20`:C.surface,
            border:`1px solid ${active?PC[i%PC.length]:C.border}`,
            borderRadius:14,padding:'8px 12px',minWidth:90}}>
            <div style=${{fontSize:11,color:active?c:C.muted,fontWeight:active?700:400,marginBottom:2}}>${p.name}</div>
            <div style=${{fontSize:18,fontWeight:800,color:active?c:C.text}}>${fmtN(tot)}</div>
          </div>`;
        })}
      </div>
    </div>

    <div style=${{flex:1,overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column'}}>
      ${totalRounds === 0 ? html`<div style=${{textAlign:'center',color:C.muted,marginTop:40,fontSize:13}}>Noch keine Züge gespielt.</div>` : html`
        <div style=${{display:'flex', gap:12, overflowX:'auto', paddingBottom:16, alignItems:'flex-start'}}>
          ${game.players.map((p, i) => {
            const vTurns = p.turns.map((t, idx) => ({...t, round: idx+1})).filter(t => t.score !== 0);
            
            return html`
              <div key=${p.name} style=${{flex:'0 0 auto', minWidth:130, background:C.surface, borderRadius:12, padding:'12px', border:`1px solid ${C.border}`}}>
                <div style=${{fontSize:14, fontWeight:800, color:PCL[i%PC.length], marginBottom:10, textAlign:'center', borderBottom:`1px solid ${C.border}`, paddingBottom:8}}>
                  ${p.name}
                </div>
                <div style=${{display:'flex', flexDirection:'column', gap:6, minHeight:50}}>
                  ${vTurns.map(t => html`
                    <div key=${t.round} style=${{display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:13}}>
                      <span style=${{color:C.muted2, fontSize:11}}>R${t.round}</span>
                      ${t.tuttoCycles>0 && html`<span style=${{fontSize:9,background:'#052e16',color:'#86efac',borderRadius:4,padding:'1px 4px'}}>${t.tuttoCycles}xT</span>`}
                      <span style=${{fontWeight:700, color:t.score>0 ? C.text : C.red}}>${t.score>0?'+':''}${fmtN(t.score)}</span>
                    </div>
                  `)}
                  ${vTurns.length === 0 ? html`<div style=${{color:C.muted, fontSize:11, textAlign:'center', padding:'10px 0'}}>Keine Punkte</div>` : null}
                </div>
                <div style=${{marginTop:10, borderTop:`1px solid ${C.border}`, paddingTop:10, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                  <span style=${{fontSize:11, color:C.muted, textTransform:'uppercase', letterSpacing:1}}>Total</span>
                  <span style=${{fontSize:16, fontWeight:900, color:PCL[i%PC.length]}}>${fmtN(total(p))}</span>
                </div>
              </div>
            `;
          })}
        </div>
      `}
    </div>

    <div style=${{padding:'16px',background:C.bg,borderTop:`1px solid ${C.border}`,zIndex:10}}>
      ${!over && html`<div style=${{textAlign:'center',marginBottom:12}}>
        <div style=${{fontSize:12,color:C.muted2,fontWeight:700,letterSpacing:1,textTransform:'uppercase'}}>Aktueller Zug</div>
        <div style=${{fontSize:20,fontWeight:800,color:PCL[roster.indexOf(cp.name)%PC.length]}}>${cp.name}</div>
        ${diff>0 && html`<div style=${{fontSize:11,color:C.muted,marginTop:2}}>${fmtN(diff)} Punkte Rückstand</div>`}
      </div>`}
      ${isOver(game)
        ? html`<${Btn} onClick=${onFinish} bg=${C.amber} dark=${true}>Spiel beenden & speichern</${Btn}>`
        : html`<${Btn} onClick=${onTurn} bg=${C.green} dark=${true}>Zug eintragen</${Btn}>`
      }
      <div style=${{display:'flex',gap:10,marginTop:12}}>
        <${Btn} onClick=${onUndo} bg=${C.surface2} border=${C.border}>↩ Letzter Zug</${Btn}>
        <${Btn} onClick=${onAbort} bg=${C.surface2} border=${C.red}>✖ Abbrechen</${Btn}>
      </div>
    </div>
  </div>`;
}

// ═══ TURN MODAL ══════════════════════════════════════════════════════════════

function TurnModal({game, roster, onRecord, onClose}) {
  const [step, setStep] = useState('draw'); 
  const [history, setHistory] = useState([]);
  const [currentCard, setCurrentCard] = useState(null);
  const [base, setBase] = useState('');
  const [deductNames, setDeductNames] = useState([]);
  
  const turnScore = history.reduce((s, h) => s + h.score, 0);
  
  const selCard = c => {
    setCurrentCard(c);
    setBase('');
    setStep('play');
  };

  const finishTurn = (hist, isBust) => {
    const totalScore = hist.reduce((s,h)=>s+h.score, 0);
    const totalBase = hist.reduce((s,h)=>s+h.baseScore, 0);
    const totalBonus = hist.reduce((s,h)=>s+h.bonusScore, 0);
    
    const finalDeduct = isBust ? [] : deductNames;
    const cardsDrawnCount = hist.length;
    const lastCard = hist[hist.length - 1];
    const isStopCard = lastCard?.card === 'stop';

    onRecord({
      score: isBust ? 0 : totalScore,
      baseScore: isBust ? 0 : totalBase,
      bonusScore: isBust ? 0 : totalBonus,
      bust: isBust,
      isStop: isStopCard,
      isInitialStop: isStopCard && cardsDrawnCount === 1,
      cardsDrawn: cardsDrawnCount,
      tuttoCycles: hist.filter(h=>h.isTutto).length,
      card: hist.length > 0 ? hist[0].card : (currentCard ? currentCard.id : null),
      cards: hist.map(h=>h.card),
      cardDetails: hist
    }, finalDeduct);
  };

  const handleBust = () => {
    const newHist = [...history, {
      card: currentCard.id, score: 0, baseScore: 0, bonusScore: 0, isTutto: false
    }];
    finishTurn(newHist, true);
  };

  const handleStop = () => {
    const b = parseInt(base) || 0;
    const newHist = [...history, {
      card: currentCard.id, baseScore: b, bonusScore: 0, score: b, isTutto: false
    }];
    finishTurn(newHist, false);
  };

  const handleTutto = () => {
    const b = parseInt(base) || 0;
    let cardScore = 0, baseSc = b, bonusSc = 0;
    let newDeduct = [...deductNames];
    
    if (currentCard.id.startsWith('bonus')) {
      const bonusVal = parseInt(currentCard.id.replace('bonus',''));
      bonusSc = bonusVal;
      cardScore = b + bonusVal;
    } 
    else if (currentCard.id === 'x2') {
      baseSc = b;
      cardScore = turnScore + (2 * b);
      bonusSc = cardScore - baseSc;
    } 
    else if (currentCard.id === 'strasse') {
      baseSc = 0; bonusSc = 2000; cardScore = 2000;
    } 
    else if (currentCard.id === 'plusminus') {
      baseSc = 0; bonusSc = 1000; cardScore = 1000;
      const tots = game.players.map(p=>({name:p.name,t:p.turns.reduce((s,t) => s+t.score, 0)}));
      const max = Math.max(...tots.map(t=>t.t));
      if (max > 0) {
        newDeduct = [...new Set([...newDeduct, ...tots.filter(t=>t.t===max).map(t=>t.name)])];
      }
    }
    
    setDeductNames(newDeduct);
    setHistory([...history, {
      card: currentCard.id, baseScore: baseSc, bonusScore: bonusSc, score: cardScore, isTutto: true
    }]);
    setStep('interim');
  };

  const handleFeuerwerk = () => {
    const b = parseInt(base) || 0;
    finishTurn([...history, {
      card: currentCard.id, baseScore: b, bonusScore: 0, score: b, isTutto: false
    }], false);
  };
  
  const handleKleeblatt = () => {
    const newHist = [...history, {
      card: currentCard.id, baseScore: 0, bonusScore: 0, score: TARGET, isTutto: true
    }];
    onRecord({
      score: TARGET, baseScore: 0, bonusScore: 0, bust: false,
      isStop: false, isInitialStop: false, cardsDrawn: newHist.length,
      tuttoCycles: newHist.filter(h=>h.isTutto).length,
      card: newHist[0].card, cards: newHist.map(h=>h.card),
      cardDetails: newHist, instant: true
    }, []);
  };

  if(step === 'draw') {
    return html`<div style=${{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',display:'flex',alignItems:'flex-end',zIndex:100}}>
      <div class="anim" style=${{background:C.surface,width:'100%',padding:'20px',borderTopLeftRadius:24,borderTopRightRadius:24,maxHeight:'90vh',overflowY:'auto'}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:15}}>
          <h3 style=${{margin:0}}>${history.length===0 ? 'Erste Karte ziehen' : 'Nächste Karte ziehen'}</h3>
          ${history.length > 0 && html`<div style=${{color:C.amber,fontWeight:700}}>Punkte: ${turnScore}</div>`}
        </div>
        
        ${history.length > 0 && html`
          <div style=${{marginBottom:15,display:'flex',gap:5,flexWrap:'wrap'}}>
            ${history.map((h,i)=>{
              const c = CARDS.find(x=>x.id===h.card);
              return html`<span key=${i} style=${{background:c.color,padding:'4px 8px',borderRadius:6,fontSize:12,color:'#fff'}}>${c.emoji} ${c.label}</span>`;
            })}
          </div>
        `}

        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          ${CARDS.map(c=>html`<button key=${c.id} onClick=${()=>selCard(c)} style=${{background:C.surface2,border:`1px solid ${c.color}`,padding:12,borderRadius:10,color:C.text}}>${c.emoji} ${c.label}</button>`)}
        </div>
        <button onClick=${history.length>0 ? ()=>finishTurn(history, false) : onClose} style=${{marginTop:15,width:'100%',padding:12,background:'none',color:C.muted,border:'none'}}>
          ${history.length>0 ? 'Zug beenden & eintragen' : 'Abbrechen'}
        </button>
      </div>
    </div>`;
  }

  if(step === 'interim') {
    return html`<div style=${{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',display:'flex',alignItems:'flex-end',zIndex:100}}>
      <div class="anim" style=${{background:C.surface,width:'100%',padding:'24px 20px',borderTopLeftRadius:24,borderTopRightRadius:24}}>
        <div style=${{textAlign:'center',marginBottom:24}}>
          <div style=${{color:C.amber,fontSize:24,fontWeight:900,marginBottom:4}}>TUTTO! 🎉</div>
          <div style=${{color:C.text,fontSize:16}}>Bisher im Zug gesammelt: <span style=${{fontWeight:800}}>${turnScore}</span></div>
        </div>
        <div style=${{display:'flex',flexDirection:'column',gap:12}}>
          <button onClick=${()=>finishTurn(history, false)} style=${{width:'100%',padding:'14px',borderRadius:14,border:`1px solid ${C.border}`,background:C.surface2,color:C.text,fontSize:16,fontWeight:700}}>Aufhören & Punkte sichern</button>
          <button onClick=${()=>setStep('draw')} style=${{width:'100%',padding:'14px',borderRadius:14,border:'none',background:C.amber,color:'#000',fontSize:16,fontWeight:800}}>Weiterwürfeln (Neue Karte)</button>
        </div>
      </div>
    </div>`;
  }

  const isFixed = ['strasse', 'plusminus', 'kleeblatt'].includes(currentCard.id);
  const isFeuerwerk = currentCard.id === 'feuerwerk';
  const isStop = currentCard.id === 'stop';

  return html`<div style=${{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',display:'flex',alignItems:'flex-end',zIndex:100}}>
    <div class="anim" style=${{background:C.surface,width:'100%',padding:'20px',borderTopLeftRadius:24,borderTopRightRadius:24,maxHeight:'90vh',overflowY:'auto'}}>
      
      <div style=${{marginBottom:20,display:'flex',gap:5,flexWrap:'wrap'}}>
        ${history.map((h,i)=>{
          const c = CARDS.find(x=>x.id===h.card);
          return html`<span key=${i} style=${{background:c.color,padding:'4px 8px',borderRadius:6,fontSize:12,color:'#fff'}}>${c.emoji} ${c.label}</span>`;
        })}
        <span style=${{background:currentCard.color,padding:'4px 8px',borderRadius:6,fontSize:12,color:'#fff',border:'2px solid #fff'}}>${currentCard.emoji} ${currentCard.label} (Aktuell)</span>
      </div>

      ${isStop ? html`
        <h3 style=${{color:C.red,textAlign:'center',margin:'20px 0'}}>🛑 Niete gezogen!</h3>
        <button onClick=${handleBust} style=${{width:'100%',padding:'13px 16px',borderRadius:14,border:'none',background:C.red,color:'#000',fontSize:15,fontWeight:700}}>Zug beenden (0 Punkte)</button>
      ` : isFixed ? html`
        <div style=${{marginBottom:24,textAlign:'center',padding:'20px',background:C.surface2,borderRadius:12}}>
          <div style=${{fontSize:14,color:C.muted}}>Vorgabe für diese Karte:</div>
          <div style=${{fontSize:18,fontWeight:800,color:C.amber,marginTop:8}}>
            ${currentCard.id==='strasse' ? 'Punkte: 2000 (Fest)' : 
              currentCard.id==='plusminus' ? 'Punkte: 1000 (Fest) & 1000 Abzug für Führende' : 
              'Ziel: 2. Tutto in Folge -> Sofortiger Sieg!'}
          </div>
        </div>
        
        <div style=${{display:'flex',flexDirection:'column',gap:12}}>
          <button onClick=${handleBust} style=${{width:'100%',padding:'13px 16px',borderRadius:14,border:`1px solid ${C.red}`,background:C.surface2,color:C.red,fontSize:15,fontWeight:700}}>💥 Niete (Bust)</button>
          ${currentCard.id === 'kleeblatt' 
            ? html`<button onClick=${handleKleeblatt} style=${{width:'100%',padding:'13px 16px',borderRadius:14,border:'none',background:C.amber,color:'#000',fontSize:15,fontWeight:700}}>Kleeblatt geschafft (SIEG!)</button>`
            : html`<button onClick=${handleTutto} style=${{width:'100%',padding:'13px 16px',borderRadius:14,border:'none',background:C.amber,color:'#000',fontSize:15,fontWeight:700}}>TUTTO geschafft!</button>`
          }
        </div>
      ` : html`
        <div style=${{marginBottom:20}}>
          <label style=${{fontSize:13,color:C.amber,fontWeight:700}}>${isFeuerwerk ? 'Punkte im Feuerwerk erwürfelt:' : 'Erwürfelte Punkte (ohne Bonus):'}</label>
          <input type="number" value=${base} onChange=${e=>setBase(e.target.value)} placeholder="z.B. 350" style=${{width:'100%',padding:15,marginTop:8,borderRadius:12,background:C.bg,border:`1px solid ${C.border}`,color:C.text,fontSize:20,textAlign:'center'}}/>
        </div>

        <div style=${{display:'flex',flexDirection:'column',gap:10}}>
          ${isFeuerwerk ? html`
            <button onClick=${handleFeuerwerk} style=${{width:'100%',padding:'13px 16px',borderRadius:14,border:'none',background:C.amber,color:'#000',fontSize:15,fontWeight:700}}>Zug abschließen (Punkte sichern)</button>
          ` : html`
            <button onClick=${handleBust} style=${{width:'100%',padding:'13px 16px',borderRadius:14,border:`1px solid ${C.red}`,background:C.surface2,color:C.red,fontSize:15,fontWeight:700}}>💥 Niete gewürfelt (0 Punkte)</button>
            <div style=${{display:'flex',gap:10}}>
              <button onClick=${handleStop} style=${{flex:1,padding:'13px 16px',borderRadius:14,border:`1px solid ${C.border}`,background:C.surface2,color:C.text,fontSize:15,fontWeight:700}}>Aufhören</button>
              <button onClick=${handleTutto} style=${{flex:1,padding:'13px 16px',borderRadius:14,border:'none',background:C.amber,color:'#000',fontSize:15,fontWeight:700}}>TUTTO!</button>
            </div>
          `}
        </div>
      `}
      
      <button onClick=${()=>setStep('draw')} style=${{marginTop:15,width:'100%',padding:12,background:'none',color:C.muted,border:'none'}}>Zurück zur Kartenauswahl</button>
    </div>
  </div>`;
}

// ═══ STATS & MORE ════════════════════════════════════════════════════════════

function Stats({games,roster,tab,setTab,selPlayer,setSelPlayer,cmp,setCmp,onBack, onDeleteGame}) {
  const [selProgGame, setSelProgGame] = useState('');
  const finished = games.filter(g=>g.finished);
  
  const pStats = roster.map(name => {
    const pg = finished.filter(g=>g.players.some(p=>p.name===name));
    const wins = pg.filter(g=>(g.winner||'').includes(name)).length;
    const allTurns = pg.flatMap(g=>g.players.find(p=>p.name===name)?.turns||[]);
    
    const totalStopCards = allTurns.filter(t => t.isStop).length;
    const totalCards = allTurns.reduce((s, t) => s + (t.cardsDrawn || 0), 0);
    const stopChance = totalCards > 0 ? Math.round((totalStopCards / totalCards) * 100) : 0;

    const validTurns = allTurns.filter(t => !t.isInitialStop);
    const finalScores = pg.map(g=>total(g.players.find(p=>p.name===name)));
    const bustTs = validTurns.filter(t=>t.bust);
    const tuttoTs = validTurns.filter(t=>t.tuttoCycles>0);
    const multiTuttoTs = validTurns.filter(t=>t.tuttoCycles>1);
    const scoringTs = validTurns.filter(t=>!t.bust && !t.isDeduction && t.score>0);

    return {
      name, n: pg.length, wins, winRate: pg.length ? Math.round(wins/pg.length*100) : 0,
      avgFinal: avg(finalScores),
      bestFinal:finalScores.length ? Math.max(...finalScores) : 0,
      worstFinal:finalScores.length ? Math.min(...finalScores) : 0,
      
      totalTurns: validTurns.length,
      stopCards: totalStopCards,
      totalCards: totalCards,
      stopChance: stopChance,
      
      bustRate: validTurns.length ? Math.round(bustTs.length/validTurns.length*100) : 0,
      tuttoRate: validTurns.length ? Math.round(tuttoTs.length/validTurns.length*100) : 0,
      multiTuttoRate: validTurns.length ? Math.round(multiTuttoTs.length/validTurns.length*100) : 0,
      avgPerTurn: validTurns.length ? Math.round(validTurns.reduce((s,t)=>s+t.score,0)/validTurns.length) : 0,
      avgPerScore: scoringTs.length ? Math.round(scoringTs.reduce((s,t)=>s+t.score,0)/scoringTs.length): 0,
      bestTurn: scoringTs.length ? Math.max(...scoringTs.map(t=>t.score)) : 0,
      finalScores, allTurns,
    };
  }).filter(p=>p.n>0);

  const TABS=[
    {id:'leaderboard',l:'Rangliste'},
    {id:'player',l:'Spieler'},
    {id:'compare',l:'Vergleich'},
    {id:'progress',l:'Spielverlauf'},
    {id:'turns',l:'Züge'},
    {id:'history',l:'Historie'}
  ];

  return html`<div style=${{maxWidth:460,margin:'0 auto',padding:'20px 16px 40px',display:'flex',flexDirection:'column',height:'100vh'}}>
    <div style=${{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
      <button onClick=${onBack} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20,padding:0}}>‹</button>
      <span style=${{fontSize:22,fontWeight:800}}>Statistiken</span>
    </div>

    <div style=${{display:'flex',gap:8,overflowX:'auto',paddingBottom:12,scrollbarWidth:'none'}}>
      ${TABS.map(t=>html`<button key=${t.id} onClick=${()=>setTab(t.id)} style=${{
        whiteSpace:'nowrap',background:tab===t.id?C.surface2:'none',border:tab===t.id?`1px solid ${C.border}`:'none',
        borderRadius:14,padding:'8px 14px',color:tab===t.id?C.amber:C.muted,fontWeight:tab===t.id?700:400,
        fontSize:13,cursor:'pointer'}}>${t.l}</button>`)}
    </div>

    <div style=${{flex:1,overflowY:'auto'}}>
      ${finished.length===0 ? html`<div style=${{textAlign:'center',color:C.muted,marginTop:40,fontSize:13}}>Noch keine beendeten Spiele.</div>` : null}
      
      ${tab==='leaderboard' && finished.length>0 && html`<div class="anim">
        ${[...pStats].sort((a,b)=>b.winRate-a.winRate).map((p,i)=>html`<div key=${p.name} style=${{
          background:C.surface,borderRadius:16,padding:'12px 16px',marginBottom:8,display:'flex',alignItems:'center',gap:12}}>
          <div style=${{fontSize:18,fontWeight:900,color:i===0?C.amber:i===1?'#94a3b8':i===2?'#b45309':C.muted2,minWidth:24}}>
            ${i+1}.
          </div>
          <div style=${{flex:1}}>
            <div style=${{fontSize:15,fontWeight:700,color:PCL[roster.indexOf(p.name)%PC.length]}}>${p.name}</div>
            <div style=${{fontSize:11,color:C.muted,marginTop:2}}>${p.n} Spiele · Ø ${fmtN(p.avgFinal)}</div>
          </div>
          <div style=${{textAlign:'right'}}>
            <div style=${{fontSize:16,fontWeight:800,color:C.text}}>${p.winRate}%</div>
            <div style=${{fontSize:10,color:C.muted2}}>Siege</div>
          </div>
        </div>`)}
      </div>`}

      ${tab==='player' && finished.length>0 && html`<div class="anim">
        <select value=${selPlayer||''} onChange=${e=>setSelPlayer(e.target.value)} style=${{
          width:'100%',padding:'12px',background:C.surface2,border:`1px solid ${C.border}`,borderRadius:12,
          color:C.text,fontSize:14,marginBottom:16,outline:'none'}}>
          <option value="">Spieler auswählen…</option>
          ${[...pStats].sort((a,b)=>b.n-a.n).map(p=>html`<option key=${p.name} value=${p.name}>${p.name}</option>`)}
        </select>
        
        ${selPlayer && pStats.find(p=>p.name===selPlayer) && (()=>{
          const selSt = pStats.find(p=>p.name===selPlayer);
          return html`<div>
            <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
              <${StatCard} label="Spiele" val=${selSt.n} sub="${selSt.wins} Siege"/>
              <${StatCard} label="Siegquote" val="${selSt.winRate}%" color=${C.amber}/>
              <${StatCard} label="Ø Punkte (Ende)" val=${fmtN(selSt.avgFinal)}/>
              <${StatCard} label="Bester Score" val=${fmtN(selSt.bestFinal)} color=${C.green}/>
            </div>
            
            <div style=${{background:C.surface,borderRadius:16,padding:14,marginBottom:16}}>
              <div style=${{fontSize:13,fontWeight:700,marginBottom:12}}>Spielweise & Risiko</div>
              <${RateBar} label="TUTTO-Rate" val=${selSt.tuttoRate} color=${C.green}/>
              <${RateBar} label="Nieten-Rate" val=${selSt.bustRate} color=${C.red}/>
              <${RateBar} label="Risiko (Mehrfach-Tutto)" val=${selSt.multiTuttoRate} color=${C.amber}/>
            </div>

            <div style=${{background:C.surface,borderRadius:16,padding:14,marginBottom:16}}>
              <div style=${{fontSize:13,fontWeight:700,marginBottom:12}}>Stopkarten-Statistik</div>
              <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                <${StatCard} label="Karten gesamt" val=${selSt.totalCards} />
                <${StatCard} label="Davon Stops" val=${selSt.stopCards} color=${C.red} />
                <${StatCard} label="Zieh-Chance" val="${selSt.stopChance}%" color=${C.amber} />
              </div>
              <div style=${{marginTop:12, fontSize:11, color:C.muted2, lineHeight:1.5}}>
                Info: Züge, in denen beim allerersten Wurf eine Stopkarte aufgedeckt wurde, fließen NICHT in die Risiko-Statistik (Tutto-Rate etc.) mit ein.
              </div>
            </div>

            ${selSt.finalScores.length>1 && html`<div style=${{background:C.surface,borderRadius:16,padding:14}}>
              <div style=${{fontSize:13,fontWeight:700,marginBottom:8}}>Endpunktzahl-Verlauf</div>
              <div style=${{height:140}}>
                <${ResponsiveContainer} width="100%" height="100%">
                  <${BarChart} data=${selSt.finalScores.map((s,i)=>({i:i+1,score:s}))}>
                    <${XAxis} dataKey="i" tick=${{fill:C.muted,fontSize:10}} axisLine=${false} tickLine=${false}/>
                    <${Tooltip} contentStyle=${{background:C.surface2,border:'none',borderRadius:8,fontSize:12,color:C.text}} cursor=${{fill:C.border}}/>
                    <${Bar} dataKey="score" fill=${PCL[roster.indexOf(selSt.name)%PC.length]} radius=${[4,4,0,0]}/>
                  </${BarChart}>
                </${ResponsiveContainer}>
              </div>
            </div>`}
          </div>`;
        })()}
      </div>`}

      ${tab==='compare' && finished.length>0 && html`<div class="anim">
        <div style=${{display:'flex',gap:8,marginBottom:16}}>
          <select value=${cmp[0]||''} onChange=${e=>setCmp([e.target.value,cmp[1]])} style=${{
            flex:1,padding:'12px',background:C.surface2,border:`1px solid ${C.border}`,borderRadius:12,color:C.text,fontSize:13,outline:'none'}}>
            <option value="">Spieler 1…</option>${pStats.map(p=>html`<option key=${p.name} value=${p.name}>${p.name}</option>`)}
          </select>
          <select value=${cmp[1]||''} onChange=${e=>setCmp([cmp[0],e.target.value])} style=${{
            flex:1,padding:'12px',background:C.surface2,border:`1px solid ${C.border}`,borderRadius:12,color:C.text,fontSize:13,outline:'none'}}>
            <option value="">Spieler 2…</option>${pStats.map(p=>html`<option key=${p.name} value=${p.name}>${p.name}</option>`)}
          </select>
        </div>
        
        ${cmp[0]&&cmp[1]&&cmp[0]!==cmp[1] ? (()=>{
          const p1 = pStats.find(p=>p.name===cmp[0]);
          const p2 = pStats.find(p=>p.name===cmp[1]);
          const comps = [
            {l:'Siegquote',     v1:`${p1.winRate}%`, v2:`${p2.winRate}%`, n1:p1.winRate, n2:p2.winRate},
            {l:'Ø Punkte Ende', v1:fmtN(p1.avgFinal), v2:fmtN(p2.avgFinal), n1:p1.avgFinal, n2:p2.avgFinal},
            {l:'TUTTO-Rate',    v1:`${p1.tuttoRate}%`, v2:`${p2.tuttoRate}%`, n1:p1.tuttoRate, n2:p2.tuttoRate},
            {l:'Nieten-Rate',   v1:`${p1.bustRate}%`, v2:`${p2.bustRate}%`, n1:p2.bustRate, n2:p1.bustRate, inv:true},
            {l:'Stop-Pech',     v1:`${p1.stopChance}%`, v2:`${p2.stopChance}%`, n1:p2.stopChance, n2:p1.stopChance, inv:true},
          ];
          return html`<div style=${{background:C.surface,borderRadius:16,padding:'8px 16px'}}>
            ${comps.map((c,i)=>html`<div key=${i} style=${{display:'flex',justifyContent:'space-between',alignItems:'center',
              padding:'12px 0',borderBottom:i<comps.length-1?`1px solid ${C.border}`:'none'}}>
              <div style=${{flex:1,fontWeight:c.n1>c.n2?700:400,color:c.n1>c.n2?PCL[roster.indexOf(p1.name)%PC.length]:C.muted,fontSize:14}}>${c.v1}</div>
              <div style=${{fontSize:11,color:C.muted2,textTransform:'uppercase',letterSpacing:1,flex:'0 0 100px',textAlign:'center'}}>${c.l}</div>
              <div style=${{flex:1,textAlign:'right',fontWeight:c.n2>c.n1?700:400,color:c.n2>c.n1?PCL[roster.indexOf(p2.name)%PC.length]:C.muted,fontSize:14}}>${c.v2}</div>
            </div>`)}
          </div>`;
        })() : html`<div style=${{textAlign:'center',color:C.muted,marginTop:20,fontSize:13}}>Wähle zwei verschiedene Spieler aus.</div>`}
      </div>`}

      ${tab==='progress' && finished.length>0 && (()=>{
        const g = finished.find(x => x.id === (selProgGame || finished[finished.length-1].id));
        if (!g) return null;
        
        const maxRounds = Math.max(...g.players.map(p=>p.turns.length));
        const chartData = Array.from({length: maxRounds + 1}, (_, i) => {
          const pt = { round: i };
          g.players.forEach(p => {
            pt[p.name] = p.turns.slice(0, i).reduce((s,t)=>s+t.score, 0);
          });
          return pt;
        });

        return html`<div class="anim">
          <select value=${g.id} onChange=${e=>setSelProgGame(e.target.value)} style=${{
            width:'100%',padding:'12px',background:C.surface2,border:`1px solid ${C.border}`,borderRadius:12,
            color:C.text,fontSize:14,marginBottom:16,outline:'none'}}>
            ${[...finished].reverse().map((fg, i) => html`<option key=${fg.id} value=${fg.id}>${fg.date} - Sieger: ${fg.winner}</option>`)}
          </select>
          
          <div style=${{background:C.surface, borderRadius:16, padding:'16px 16px 16px 0'}}>
            <div style=${{paddingLeft:16, fontSize:13, fontWeight:700, marginBottom:16}}>Punkteverlauf pro Runde</div>
            <div style=${{height: 300}}>
              <${ResponsiveContainer} width="100%" height="100%">
                <${LineChart} data=${chartData}>
                  <${CartesianGrid} strokeDasharray="3 3" stroke=${C.border} vertical=${false}/>
                  <${XAxis} dataKey="round" stroke=${C.muted} tick=${{fill:C.muted, fontSize:10}} tickLine=${false} axisLine=${false}/>
                  <${YAxis} stroke=${C.muted} tick=${{fill:C.muted, fontSize:10}} tickLine=${false} axisLine=${false} width=${45}/>
                  <${Tooltip} contentStyle=${{background:C.surface2, border:'none', borderRadius:8, color:C.text}} itemStyle=${{fontSize:13, fontWeight:700}}/>
                  <${Legend} wrapperStyle=${{fontSize:11, paddingTop:10}} iconType="circle"/>
                  ${g.players.map((p, i) => html`
                    <${Line} key=${p.name} type="monotone" dataKey=${p.name} stroke=${PCL[roster.indexOf(p.name)%PC.length]} strokeWidth=${3} dot=${false} activeDot=${{r:6}} />
                  `)}
                </${LineChart}>
              </${ResponsiveContainer}>
            </div>
          </div>
        </div>`;
      })()}

      ${tab==='turns' && finished.length>0 && html`<div class="anim">
        <div style=${{background:C.surface,borderRadius:16,padding:'12px 16px'}}>
          <div style=${{fontSize:11,color:C.muted2,letterSpacing:2,textTransform:'uppercase',marginBottom:12,fontWeight:700}}>Top 10 Züge</div>
          ${(()=>{
            const all = finished.flatMap(g=>g.players.flatMap(p=>p.turns.map(t=>({...t,name:p.name,date:g.date})))).filter(t => t.score > 0);
            all.sort((a,b)=>b.score-a.score);
            return all.slice(0,10).map((t,i)=>{
              const ci=roster.indexOf(t.name);
              const card=CARDS.find(c=>c.id===t.card);
              return html`<div key=${i} style=${{display:'flex',alignItems:'center',gap:10,
                padding:'7px 0',borderBottom:i<9?`1px solid ${C.border}`:'none'}}>
                <div style=${{fontSize:14,fontWeight:900,color:i===0?C.amberL:C.muted2,minWidth:22}}>${i+1}.</div>
                <div style=${{flex:1,minWidth:0}}>
                  <span style=${{color:PCL[ci%PC.length],fontSize:13,fontWeight:600}}>${t.name}</span>
                  ${t.tuttoCycles>0 && html`<span style=${{fontSize:9,background:'#052e16',color:'#86efac',borderRadius:4,padding:'2px 5px',marginLeft:6}}>${t.tuttoCycles===1?'TUTTO':`${t.tuttoCycles}× TUTTO`}</span>`}
                  <div style=${{fontSize:10,color:C.muted2}}>${t.date}</div>
                </div>
                <div style=${{display:'flex',alignItems:'center',gap:6}}>
                  ${card && html`<span style=${{fontSize:13}} title=${card.label}>${card.emoji}</span>`}
                  <span style=${{fontSize:15,fontWeight:800,color:C.text}}>+${fmtN(t.score)}</span>
                </div>
              </div>`;
            });
          })()}
        </div>
      </div>`}

      ${tab==='history' && finished.length>0 && html`<div class="anim">
        ${[...finished].reverse().map(g=>{
          const tots = g.players.map(p=>total(p));
          const maxT = Math.max(...tots);
          return html`<div key=${g.id} style=${{background:C.surface,borderRadius:16,padding:'12px 16px',marginBottom:10}}>
            <div style=${{display:'flex',justifyContent:'space-between',marginBottom:8,alignItems:'flex-start'}}>
              <div>
                <span style=${{fontSize:12,color:C.muted}}>${g.date}</span>
                ${g.winner && html`<span style=${{fontSize:12,color:C.amber,fontWeight:700,marginLeft:8}}>🏆 ${g.winner}</span>`}
              </div>
              <button onClick=${()=>onDeleteGame(g.id)} style=${{background:'none',border:'none',color:C.red,cursor:'pointer',fontSize:18,padding:0,lineHeight:1}} title="Spiel löschen">🗑️</button>
            </div>
            ${g.players.map((p,i)=>html`<div key=${p.name} style=${{display:'flex',justifyContent:'space-between',padding:'4px 0',
              borderBottom:i<g.players.length-1?`1px solid ${C.border}`:'none'}}>
              <span style=${{fontSize:13,color:tots[i]===maxT?PCL[roster.indexOf(p.name)%PC.length]:C.muted}}>${p.name}</span>
              <span style=${{fontSize:13,fontWeight:tots[i]===maxT?700:400,color:tots[i]===maxT?C.text:C.muted}}>${fmtN(tots[i])}</span>
            </div>`)}
          </div>`;
        })}
      </div>`}
    </div>
  </div>`;
}

// ═══ GITHUB SETTINGS ═════════════════════════════════════════════════════════

function GhSettings({initial,onSave,onBack}) {
  const [token, setToken] = useState(initial?.token||'');
  const [owner, setOwner] = useState(initial?.owner||'');
  const [repo,  setRepo]  = useState(initial?.repo||'');
  const [testing, setTesting] = useState(false);
  const [res, setRes] = useState(null);

  const test = async () => {
    setTesting(true); setRes(null);
    try {
      const r=await fetch(`https://api.github.com/repos/${owner}/${repo}`,{headers:{Authorization:`token ${token}`}});
      if (r.ok) setRes({ok:true,msg:'Zugriff erfolgreich!'});
      else setRes({ok:false,msg:`Fehler: ${r.status}`});
    } catch(e) { setRes({ok:false,msg:'Netzwerkfehler'}); }
    setTesting(false);
  };

  return html`<div style=${{maxWidth:460,margin:'0 auto',padding:'20px 16px'}}>
    <div style=${{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
      <button onClick=${onBack} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20,padding:0}}>‹</button>
      <span style=${{fontSize:22,fontWeight:800}}>GitHub Sync</span>
    </div>
    <div style=${{fontSize:13,color:C.muted,lineHeight:1.5,marginBottom:20}}>
      Speichere Spiele und Statistiken automatisch in einem privaten GitHub-Repository, um sie über mehrere Geräte hinweg zu synchronisieren.
    </div>
    
    <label style=${{display:'block',fontSize:11,color:C.muted2,fontWeight:700,textTransform:'uppercase',marginBottom:4}}>Token (mit repo scope)</label>
    <input type="password" value=${token} onChange=${e=>setToken(e.target.value)} placeholder="ghp_..."
      style=${{width:'100%',background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:'11px',color:C.text,fontSize:14,marginBottom:12,outline:'none'}}/>
      
    <label style=${{display:'block',fontSize:11,color:C.muted2,fontWeight:700,textTransform:'uppercase',marginBottom:4}}>GitHub Benutzername</label>
    <input value=${owner} onChange=${e=>setOwner(e.target.value)} placeholder="z.B. maxmustermann"
      style=${{width:'100%',background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:'11px',color:C.text,fontSize:14,marginBottom:12,outline:'none'}}/>
      
    <label style=${{display:'block',fontSize:11,color:C.muted2,fontWeight:700,textTransform:'uppercase',marginBottom:4}}>Repository Name</label>
    <input value=${repo} onChange=${e=>setRepo(e.target.value)} placeholder="z.B. tutto-data"
      style=${{width:'100%',background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:'11px',color:C.text,fontSize:14,outline:'none'}}/>
      
    <div style=${{display:'flex',gap:10,marginTop:8}}>
      <button onClick=${test} disabled=${testing||!token||!owner||!repo}
        style=${{flex:1,background:C.surface2,border:`1px solid ${C.border}`,borderRadius:12,padding:'11px',
          color:C.text,cursor:'pointer',fontSize:14,fontWeight:600,opacity:(!token||!owner||!repo)?0.4:1}}>
        ${testing?'…':'Testen'}
      </button>
      <button onClick=${()=>onSave({token,owner,repo})} disabled=${!token||!owner||!repo}
        style=${{flex:2,background:C.amber,border:'none',borderRadius:12,padding:'11px',color:'#000',
          cursor:'pointer',fontSize:14,fontWeight:700,opacity:(!token||!owner||!repo)?0.4:1}}>
        Aktivieren
      </button>
    </div>
    ${res && html`<div style=${{marginTop:12,padding:'10px 14px',borderRadius:10,
      background:res.ok?'#052e16':'#2d0a0a',color:res.ok?C.green:C.red,fontSize:13}}>${res.msg}</div>`}
    
    ${initial?.token && html`<button onClick=${()=>onSave(null)} style=${{background:'none',border:'none',
      color:C.muted,cursor:'pointer',fontSize:12,marginTop:24,width:'100%',textAlign:'center'}}>
      Sync deaktivieren & löschen
    </button>`}
  </div>`;
}

root.render(html`<${App}/>`);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
