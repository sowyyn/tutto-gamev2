// ═══ CONSTANTS ═══════════════════════════════════════════════════════════════

const TARGET = 6000;

const CARDS = [
  { id:'bonus200',  label:'Bonus 200',  emoji:'🎁', color:'#b45309' },
  { id:'bonus300',  label:'Bonus 300',  emoji:'🎁', color:'#b45309' },
  { id:'bonus400',  label:'Bonus 400',  emoji:'🎁', color:'#a16207' },
  { id:'bonus500',  label:'Bonus 500',  emoji:'🎁', color:'#92400e' },
  { id:'bonus600',  label:'Bonus 600',  emoji:'🎁', color:'#92400e' },
  { id:'x2',        label:'×2',         emoji:'✖',  color:'#7c3aed' },
  { id:'stop',      label:'Stop',       emoji:'🛑', color:'#6b7280' },
  { id:'feuerwerk', label:'Feuerwerk',  emoji:'🎆', color:'#dc2626' },
  { id:'plusminus', label:'Plus/Minus', emoji:'⊕',  color:'#0284c7' },
  { id:'kleeblatt', label:'Kleeblatt',  emoji:'🍀', color:'#16a34a' },
  { id:'strasse',   label:'Straße',     emoji:'🛣',  color:'#d97706' },
];

const QUICK = [50, 100, 150, 200, 300, 500, 1000, 2000];

const C = {
  bg:'#0e0900', surface:'#1c1200', surface2:'#281a00', border:'#3d2800',
  text:'#fff8e6', muted:'#a08040', muted2:'#5a4020',
  amber:'#f59e0b', amberL:'#fde68a',
  red:'#ef4444', green:'#22c55e',
};
const PC  = ['#f59e0b','#ef4444','#10b981','#818cf8','#f97316','#e879f9','#38bdf8'];
const PCL = ['#fde68a','#fca5a5','#6ee7b7','#c7d2fe','#fed7aa','#f5d0fe','#bae6fd'];

// ═══ HELPERS ═════════════════════════════════════════════════════════════════

const total  = p   => p.turns.reduce((s,t) => s+t.score, 0);
const ls     = (k,d) => { try{const v=localStorage.getItem(k); return v?JSON.parse(v):d;}catch{return d;} };
const lsSet  = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v));}catch{} };
const lsDel  = k     => { try{localStorage.removeItem(k);}catch{} };
const pColor = (name,roster,light=false) => { const i=roster.indexOf(name); return (light?PCL:PC)[i%PC.length]; };
const avg    = arr   => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;
const fmtN   = n     => n.toLocaleString('de-DE');

const isOver = game => {
  if (!game?.players?.length) return false;
  if (game.players.some(p=>p.turns.some(t=>t.instant))) return true;
  const tots  = game.players.map(total);
  const turns = game.players.map(p=>p.turns.length);
  return tots.some(t=>t>=TARGET) && turns.every(t=>t===turns[0]) && turns[0]>0;
};

const getWinner = game => {
  const instant = game.players.find(p=>p.turns.some(t=>t.instant));
  if (instant) return instant.name;
  const tots = game.players.map(p=>({name:p.name,t:total(p)}));
  const max  = Math.max(...tots.map(t=>t.t));
  const w    = tots.filter(t=>t.t===max);
  return w.length===1 ? w[0].name : w.map(p=>p.name).join(' & ');
};

// ═══ GITHUB SYNC ═════════════════════════════════════════════════════════════

const GH_FILE = 'tuttodata.json';
const ghH = t => ({ Authorization:`token ${t}`, Accept:'application/vnd.github.v3+json' });
async function ghRead(cfg) {
  const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${GH_FILE}`,{headers:ghH(cfg.token)});
  if (r.status===404) return {data:null,sha:null};
  if (!r.ok) throw new Error(`GitHub ${r.status}`);
  const j = await r.json();
  return {data:JSON.parse(atob(j.content.replace(/\n/g,''))),sha:j.sha};
}
async function ghWrite(cfg,data,sha) {
  const body={message:'Tutto update',content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))))};
  if (sha) body.sha=sha;
  const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${GH_FILE}`,
    {method:'PUT',headers:{...ghH(cfg.token),'Content-Type':'application/json'},body:JSON.stringify(body)});
  if (!r.ok) throw new Error(`GitHub ${r.status}`);
  return (await r.json()).content.sha;
}
function mergeData(local,remote) {
  const games=[...(remote.games||[])];
  const ids=new Set(games.map(g=>g.id));
  for(const g of (local.games||[])) if(!ids.has(g.id)){games.push(g);ids.add(g.id);}
  const roster=[...new Set([...(remote.roster||[]),...(local.roster||[])])];
  return {games:games.sort((a,b)=>a.id.localeCompare(b.id)),roster};
}

// ═══ SHARED COMPONENTS ═══════════════════════════════════════════════════════

function Btn({onClick,bg,border,children,disabled,dark}) {
  return html`<button onClick=${onClick} disabled=${disabled} style=${{
    width:'100%',padding:'13px 16px',borderRadius:14,border:border?`1px solid ${border}`:'none',
    background:disabled?C.muted2:bg,color:dark?'#000':'white',fontSize:15,fontWeight:700,
    cursor:disabled?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,
    opacity:disabled?0.5:1,transition:'opacity 0.15s'}}>${children}</button>`;
}

function StatCard({label,val,color,sub}) {
  return html`<div style=${{background:C.surface2,borderRadius:10,padding:'8px 10px',textAlign:'center'}}>
    <div style=${{fontSize:10,color:C.muted,marginBottom:3}}>${label}</div>
    <div style=${{fontSize:16,fontWeight:700,color:color||C.text}}>${val}</div>
    ${sub&&html`<div style=${{fontSize:9,color:C.muted2,marginTop:1}}>${sub}</div>`}
  </div>`;
}

function RateBar({label,val,color}) {
  return html`<div style=${{marginBottom:9}}>
    <div style=${{display:'flex',justifyContent:'space-between',marginBottom:3}}>
      <span style=${{fontSize:12}}>${label}</span>

    </div>
    <div style=${{height:5,background:C.surface2,borderRadius:3,overflow:'hidden'}}>
      <div style=${{height:5,borderRadius:3,background:color,width:`${val}%`,transition:'width 0.4s'}}/>
    </div>
  </div>`;
}

// ═══ APP ═════════════════════════════════════════════════════════════════════

function App() {
  const [screen, setScreen] = useState('home');
  const [games,  setGames]  = useState(()=>ls('tt:games',[]));
  const [cur,    setCur]    = useState(()=>ls('tt:current',null));
  const [roster, setRoster] = useState(()=>ls('tt:roster',[]));
  const [modal,  setModal]  = useState(false);
  const [stab,   setStab]   = useState('leaderboard');
  const [sPl,    setSPl]    = useState(null);
  const [sCmp,   setSCmp]   = useState([null,null]);
  const [ghCfg,  setGhCfg]  = useState(()=>ls('tt:gh',null));
  const [syncSt, setSyncSt] = useState('idle');
  const [syncMsg,setSyncMsg]= useState('');

  useEffect(()=>{
    if (roster.length===0) setScreen('setup');
    else if (ghCfg?.token) doSync();
  },[]);

  const doSync = async cfg => {
    const c=cfg||ghCfg; if(!c?.token) return;
    setSyncSt('syncing');
    try {
      const {data,sha}=await ghRead(c);
      if (data) {
        const m=mergeData({games:ls('tt:games',[]),roster:ls('tt:roster',[])},data);
        setGames(m.games); lsSet('tt:games',m.games);
        setRoster(m.roster); lsSet('tt:roster',m.roster);
        lsSet('tt:gh_sha',sha);
      }
      setSyncSt('ok'); setSyncMsg(new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}));
    } catch(e){setSyncSt('error');setSyncMsg(e.message);}
  };

  const pushGh = async(g,r) => {
    const c=ghCfg; if(!c?.token) return;
    setSyncSt('syncing');
    try {
      const {sha}=await ghRead(c);
      const ns=await ghWrite(c,{version:1,roster:r,games:g},sha);
      lsSet('tt:gh_sha',ns);
      setSyncSt('ok'); setSyncMsg(new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}));
    } catch(e){setSyncSt('error');setSyncMsg(e.message);}
  };

  const saveGames  = (g,r) => { setGames(g);  lsSet('tt:games',g);  pushGh(g,r||roster); };
  const saveRoster = r     => { setRoster(r); lsSet('tt:roster',r); };
  const saveCur    = g     => { setCur(g); g ? lsSet('tt:current',g) : lsDel('tt:current'); };

  const startGame = players => {
    const nr=[...new Set([...roster,...players])];
    saveRoster(nr);
    saveCur({id:Date.now().toString(), date:new Date().toLocaleDateString('de-DE'),
      players:players.map(name=>({name,turns:[]})), currentPlayerIdx:0});
    setScreen('game');
  };

  const recordTurn = (turnData, deductNames=[]) => {
    if (!cur) return;
    let np = cur.players.map((p,i) =>
      i===cur.currentPlayerIdx ? {...p, turns:[...p.turns, turnData]} : p
    );
    // Plus/Minus: −1000 von jeder Führungs-Person (nie unter 0)
    for (const name of deductNames) {
      const pTot = np.find(p=>p.name===name)?.turns.reduce((s,t)=>s+t.score, 0) ?? 0;
      const actual = Math.min(1000, Math.max(0, pTot));
      if (actual > 0) {
        np = np.map(p => p.name===name
          ? {...p, turns:[...p.turns, {score:-actual, bust:false, tuttoCycles:0, card:'plusminus_abzug', isDeduction:true}]}
          : p);
      }
    }
    saveCur({...cur, players:np, currentPlayerIdx:(cur.currentPlayerIdx+1)%cur.players.length});
    setModal(false);
  };

  const finishGame = () => {
    if (!cur) return;
    const winner = getWinner(cur);
    saveGames([...games,{...cur,winner,finished:true}], roster);
    saveCur(null);
    setScreen('home');
  };

  const syncBadge = html`<span style=${{fontSize:11,color:syncSt==='ok'?C.green:syncSt==='error'?C.red:C.muted}}>
    ${syncSt==='syncing'?'↻ Sync…':syncSt==='ok'?`☁ ${syncMsg}`:syncSt==='error'?'⚠ Sync-Fehler':''}
  </span>`;

  return html`<div style=${{minHeight:'100vh',background:C.bg,color:C.text}}>
    ${screen==='home'  && html`<${Home}      ...${{games,roster,cur,syncBadge,onNew:()=>setScreen('setup'),onContinue:()=>setScreen('game'),onStats:()=>setScreen('stats'),onGh:()=>setScreen('gh')}}/>`}
    ${screen==='setup' && html`<${GameSetup} roster=${roster} onStart=${startGame} onBack=${()=>setScreen('home')}/>`}
    ${screen==='game' && cur && html`
      <${Game} ...${{game:cur,roster,onTurn:()=>setModal(true),onFinish:finishGame,onBack:()=>setScreen('home')}}/>
      ${modal && html`<${TurnModal} ...${{game:cur,roster,onRecord:recordTurn,onClose:()=>setModal(false)}}/>`}
    `}
    ${screen==='stats' && html`<${Stats} ...${{games,roster,tab:stab,setTab:setStab,selPlayer:sPl,setSelPlayer:setSPl,cmp:sCmp,setCmp:setSCmp,onBack:()=>setScreen('home')}}/>`}
    ${screen==='gh'    && html`<${GhSettings} initial=${ghCfg} onSave=${cfg=>{setGhCfg(cfg);lsSet('tt:gh',cfg);if(cfg)doSync(cfg);setScreen('home');}} onBack=${()=>setScreen('home')}/>`}
  </div>`;
}

// ═══ HOME ════════════════════════════════════════════════════════════════════

function Home({games,roster,cur,syncBadge,onNew,onContinue,onStats,onGh}) {
  const recent=[...games].reverse().slice(0,5);
  return html`<div style=${{maxWidth:460,margin:'0 auto',padding:'0 16px 48px'}}>
    <div style=${{textAlign:'center',padding:'44px 0 26px'}}>
      <div style=${{fontSize:52,fontWeight:900,letterSpacing:-2,fontStyle:'italic',
        background:`linear-gradient(135deg,${C.amber},#fbbf24,#f97316)`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
        TUTTO
      </div>
      <div style=${{fontSize:12,color:C.muted,marginTop:2,letterSpacing:2,textTransform:'uppercase'}}>Digitaler Spielblock</div>
      <div style=${{marginTop:6}}>${syncBadge}</div>
    </div>

    <div style=${{display:'flex',flexDirection:'column',gap:10}}>
      ${cur && html`<${Btn} onClick=${onContinue} bg=${C.amber} dark=${true}>▶ Spiel fortsetzen</${Btn}>`}
      <${Btn} onClick=${onNew}   bg=${C.surface2} border=${C.border}>+ Neues Spiel</${Btn}>
      <${Btn} onClick=${onStats} bg=${C.surface2} border=${C.border}>
        📊 Statistiken <span style=${{fontSize:12,color:C.muted,marginLeft:4}}>${games.length} Spiele</span>
      </${Btn}>
    </div>

    <div style=${{display:'flex',justifyContent:'center',marginTop:12}}>
      <button onClick=${onGh} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:13}}>☁ GitHub Sync</button>
    </div>

    ${recent.length>0 && html`<div style=${{marginTop:28}}>
      <div style=${{fontSize:11,color:C.muted2,letterSpacing:2,textTransform:'uppercase',marginBottom:10,fontWeight:700}}>Letzte Spiele</div>
      ${recent.map(g=>{
        const tots=g.players.map(p=>total(p));
        const maxT=Math.max(...tots);
        const rounds=Math.max(...g.players.map(p=>p.turns.length),0);
        return html`<div key=${g.id} style=${{padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
          <div style=${{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style=${{color:C.muted,fontSize:12}}>${g.date}</span>
            <span style=${{color:C.muted2,fontSize:11}}>${g.players.length} Spieler · ${rounds} Runden</span>
          </div>
          <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
            ${g.players.map((p,i)=>html`<span key=${i} style=${{fontSize:13,color:tots[i]===maxT?PCL[i%PC.length]:C.muted}}>
              ${p.name}: <strong>${fmtN(tots[i])}</strong>
            </span>`)}
          </div>
          ${g.winner && html`<div style=${{fontSize:11,color:C.amber,marginTop:3}}>🏆 ${g.winner}</div>`}
        </div>`;
      })}
    </div>`}

    <div style=${{marginTop:24,padding:'12px',background:C.surface,borderRadius:12,fontSize:11,color:C.muted,lineHeight:1.7}}>
      <strong style=${{color:C.text}}>Punkte:</strong> ⚄=50 · ⚀=100 · Drillinge: 2×200, 3×300, 4×400, 5×500, 6×600, 1×1000 · Straße=2000 · Ziel: 6.000
    </div>
  </div>`;
}

// ═══ GAME SETUP ══════════════════════════════════════════════════════════════

function GameSetup({roster,onStart,onBack}) {
  const [selected,setSelected] = useState([]);
  const [newName, setNewName]  = useState('');

  const toggle = name => {
    if (selected.includes(name)) setSelected(selected.filter(n=>n!==name));
    else if (selected.length<8) setSelected([...selected,name]);
  };
  const addNew = () => {
    const n=newName.trim(); if(!n||selected.length>=8) return;
    if (!selected.includes(n)) setSelected([...selected,n]);
    setNewName('');
  };

  return html`<div style=${{maxWidth:460,margin:'0 auto',padding:'20px 16px 40px'}}>
    <div style=${{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
      ${roster.length>0 && html`<button onClick=${onBack} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20,padding:0}}>‹</button>`}
      <span style=${{fontSize:22,fontWeight:800}}>Neues Spiel</span>
    </div>

    ${selected.length>0 && html`<div style=${{marginBottom:20}}>
      <div style=${{fontSize:11,color:C.muted2,letterSpacing:2,textTransform:'uppercase',marginBottom:8,fontWeight:700}}>Ausgewählt (${selected.length}/8)</div>
      <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
        ${selected.map((n,i)=>html`<div key=${n} style=${{display:'flex',alignItems:'center',gap:6,background:C.surface2,
          border:`2px solid ${PC[i%PC.length]}`,borderRadius:20,padding:'6px 12px'}}>
          <span style=${{color:PC[i%PC.length],fontWeight:700,fontSize:12}}>${i+1}</span>
          <span style=${{fontSize:13}}>${n}</span>
          <button onClick=${()=>toggle(n)} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:14,padding:'0 0 0 4px'}}>×</button>
        </div>`)}
      </div>
    </div>`}

    ${roster.length>0 && html`<div style=${{marginBottom:20}}>
      <div style=${{fontSize:11,color:C.muted2,letterSpacing:2,textTransform:'uppercase',marginBottom:8,fontWeight:700}}>Bekannte Spieler</div>
      <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
        ${roster.map(n=>{
          const idx=selected.indexOf(n);
          const sel=idx>=0;
          return html`<button key=${n} onClick=${()=>toggle(n)} style=${{
            background:sel?C.surface2:C.surface,border:`2px solid ${sel?PC[idx%PC.length]:C.border}`,
            borderRadius:20,padding:'7px 14px',color:sel?PC[idx%PC.length]:C.muted,cursor:'pointer',
            fontSize:13,fontWeight:sel?700:400}}>
            ${sel?`${idx+1}. `:''}${n}
          </button>`;
        })}
      </div>
    </div>`}

    <div style=${{marginBottom:24}}>
      <div style=${{fontSize:11,color:C.muted2,letterSpacing:2,textTransform:'uppercase',marginBottom:8,fontWeight:700}}>Neuen Spieler hinzufügen</div>
      <div style=${{display:'flex',gap:8}}>
        <input value=${newName} onChange=${e=>setNewName(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&addNew()}
          placeholder="Name eingeben…"
          style=${{flex:1,background:C.surface2,border:`1px solid ${C.border}`,borderRadius:12,padding:'11px 14px',color:C.text,fontSize:15,outline:'none'}}/>
        <button onClick=${addNew} disabled=${!newName.trim()||selected.length>=8}
          style=${{background:C.amber,border:'none',borderRadius:12,padding:'11px 18px',color:'#000',
            cursor:'pointer',fontWeight:700,fontSize:15,opacity:(!newName.trim()||selected.length>=8)?0.4:1}}>+</button>
      </div>
    </div>

    <${Btn} onClick=${()=>onStart(selected)} bg=${C.amber} dark=${true} disabled=${selected.length<2}>
      ${selected.length<2?'Mindestens 2 Spieler wählen':`Spiel starten mit ${selected.length} Spielern`}
    </${Btn}>
  </div>`;
}

// ═══ GAME VIEW ═══════════════════════════════════════════════════════════════

function Game({game,roster,onTurn,onFinish,onBack}) {
  const over   = isOver(game);
  const tots   = game.players.map(total);
  const maxTot = Math.max(...tots,1);
  const curP   = game.players[game.currentPlayerIdx];
  const rounds = Math.max(...game.players.map(p=>p.turns.length), 0);

  // Flatten turn history, most recent first
  const history = [];
  for (let r=rounds-1; r>=0; r--)
    for (let pi=game.players.length-1; pi>=0; pi--)
      if (game.players[pi].turns[r]) history.push({pi, t:game.players[pi].turns[r], r:r+1});

  return html`<div style=${{maxWidth:460,margin:'0 auto'}}>
    <!-- Sticky header -->
    <div style=${{position:'sticky',top:0,zIndex:10,background:C.bg,borderBottom:`1px solid ${C.border}`,padding:'10px 12px'}}>
      <div style=${{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
        <button onClick=${onBack} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20,padding:0}}>‹</button>
        <span style=${{fontSize:12,color:C.muted,flex:1}}>${game.date} · Ziel ${fmtN(TARGET)}</span>
        <span style=${{fontSize:11,color:C.muted2}}>${rounds} Runde${rounds!==1?'n':''}</span>
      </div>
      <!-- Player score cards -->
      <div style=${{display:'flex',gap:7,overflowX:'auto',paddingBottom:2}}>
        ${game.players.map((p,i)=>{
          const t=tots[i];
          const isCur=i===game.currentPlayerIdx&&!over;
          const isLead=t===Math.max(...tots)&&t>0;
          return html`<div key=${i} style=${{flexShrink:0,background:C.surface2,borderRadius:12,padding:'7px 11px',
            borderLeft:`3px solid ${PC[i%PC.length]}`,minWidth:86,
            outline:isCur?`2px solid ${PC[i%PC.length]}`:'none',outlineOffset:'2px'}}>
            <div style=${{fontSize:9,color:C.muted,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:80}}>${p.name}</div>
            <div style=${{fontSize:22,fontWeight:900,color:PCL[i%PC.length]}}>${fmtN(t)}</div>
            <div style=${{height:2,background:C.border,borderRadius:1,marginTop:3}}>
              <div style=${{height:2,borderRadius:1,background:PC[i%PC.length],width:`${Math.min(t/TARGET*100,100)}%`,transition:'width 0.5s'}}/>
            </div>
            ${isCur && html`<div style=${{fontSize:8,color:PC[i%PC.length],marginTop:3,fontWeight:700,letterSpacing:1}}>AM ZUG</div>`}
            ${isLead&&!isCur && html`<div style=${{fontSize:8,color:C.amberL,marginTop:3}}>🏆 führt</div>`}
          </div>`;
        })}
      </div>
    </div>

    <div style=${{padding:'12px 12px 80px'}}>
      <!-- Game over -->
      ${over && html`<div class="anim" style=${{background:'linear-gradient(135deg,#3b1a00,#1c0e00)',borderRadius:20,padding:20,
        marginBottom:14,textAlign:'center',border:`2px solid ${C.amber}`}}>
        <div style=${{fontSize:28}}>🏆</div>
        <div style=${{fontSize:20,fontWeight:900,color:C.amberL,marginTop:8}}>${getWinner(game)} gewinnt!</div>
        <div style=${{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center',marginTop:10}}>
          ${game.players.map((p,i)=>html`<span key=${i} style=${{color:PCL[i%PC.length],fontSize:13}}>
            ${p.name}: <strong>${fmtN(tots[i])}</strong>
          </span>`)}
        </div>
        <div style=${{marginTop:14}}><${Btn} onClick=${onFinish} bg=${C.amber} dark=${true}>💾 Spiel speichern & beenden</${Btn}></div>
      </div>`}

      <!-- Current player -->
      ${!over && html`<div style=${{background:C.surface,borderRadius:16,padding:'12px 16px',marginBottom:12,
        borderLeft:`4px solid ${PC[game.currentPlayerIdx%PC.length]}`}}>
        <div style=${{fontSize:11,color:C.muted,marginBottom:4,letterSpacing:1,textTransform:'uppercase',fontWeight:700}}>Am Zug</div>
        <div style=${{fontSize:18,fontWeight:800,color:PCL[game.currentPlayerIdx%PC.length]}}>${curP.name}</div>
        <div style=${{fontSize:12,color:C.muted,marginTop:2}}>
          ${fmtN(tots[game.currentPlayerIdx])} Punkte · noch ${fmtN(Math.max(0,TARGET-tots[game.currentPlayerIdx]))} bis ${fmtN(TARGET)}
        </div>
        ${tots.some(t=>t>=TARGET) && html`<div style=${{fontSize:11,color:C.red,marginTop:4,fontWeight:600}}>⚡ Finale Runde — alle müssen gleich oft gespielt haben!</div>`}
        <div style=${{marginTop:12}}>
          <button onClick=${onTurn} style=${{width:'100%',background:PC[game.currentPlayerIdx%PC.length],border:'none',
            borderRadius:12,padding:'13px',color:'#000',fontWeight:800,fontSize:16,cursor:'pointer',letterSpacing:0.5}}>
            🎲 Zug eintragen
          </button>
        </div>
      </div>`}

      <!-- Turn history -->
      ${history.length>0 && html`<div>
        <div style=${{fontSize:11,color:C.muted2,letterSpacing:2,textTransform:'uppercase',marginBottom:8,fontWeight:700}}>Zugverlauf</div>
        ${history.slice(0,25).map(({pi,t,r},idx)=>{
          const p=game.players[pi];
          const card=CARDS.find(c=>c.id===t.card);
          return html`<div key=${idx} style=${{display:'flex',alignItems:'center',gap:10,padding:'8px 0',
            borderBottom:`1px solid ${C.border}`,opacity:idx<3?1:0.6}}>
            <div style=${{width:8,height:8,borderRadius:'50%',background:PC[pi%PC.length],flexShrink:0}}/>
            <div style=${{flex:1,minWidth:0}}>
              <span style=${{color:PCL[pi%PC.length],fontSize:13,fontWeight:600}}>${p.name}</span>
              <span style=${{fontSize:10,color:C.muted2,marginLeft:5}}>R${r}</span>
              ${card && html`<span style=${{fontSize:10,color:C.muted,marginLeft:6}}>${card.emoji} ${card.label}</span>`}
            </div>
            <div style=${{display:'flex',gap:4,alignItems:'center',flexShrink:0}}>
              ${t.bust   && html`<span style=${{fontSize:9,background:'#7f1d1d',color:'#fca5a5',borderRadius:4,padding:'2px 5px'}}>Niete</span>`}
              ${t.isDeduction && html`<span style=${{fontSize:9,background:'#1a0030',color:'#c4b5fd',borderRadius:4,padding:'2px 5px'}}>⊕ Abzug</span>`}
              ${(()=>{ const cy=(t.tuttoCycles??(t.tutto?1:0)); return !t.isDeduction&&cy>0&&html`<span style=${{fontSize:9,background:'#052e16',color:'#86efac',borderRadius:4,padding:'2px 5px'}}>${cy===1?'TUTTO':`${cy}× TUTTO`}</span>`; })()}
              ${t.instant&& html`<span style=${{fontSize:9,background:'#14532d',color:'#86efac',borderRadius:4,padding:'2px 5px'}}>🍀 Sieg</span>`}
              <span style=${{fontSize:15,fontWeight:800,color:t.bust?C.red:t.score<0?C.red:t.score>0?C.text:C.muted,minWidth:52,textAlign:'right'}}>
                ${t.bust?'—':t.score>0?`+${fmtN(t.score)}`:t.score<0?t.score.toLocaleString('de-DE'):'-'}
              </span>
            </div>
          </div>`;
        })}
      </div>`}
    </div>
  </div>`;
}

// ═══ TURN MODAL ══════════════════════════════════════════════════════════════

function TurnModal({game,roster,onRecord,onClose}) {
  const pi    = game.currentPlayerIdx;
  const p     = game.players[pi];
  const pc    = PC[pi%PC.length];
  const [score,       setScore]       = useState('');
  const [bust,        setBust]        = useState(false);
  const [tuttoCycles, setTuttoCycles] = useState(0);
  const [card,        setCard]        = useState(null);
  const [showCards,   setShowCards]   = useState(false);

  const submit = () => {
    if (bust)       { onRecord({score:0,   bust:true, tuttoCycles:0, card}); return; }
    if (score==='') return;
    onRecord({score:Number(score), bust:false, tuttoCycles, card});
  };

  const toggleBust = () => {
    const nb=!bust;
    setBust(nb);
    if (nb) { setScore(''); setTuttoCycles(0); }
  };

  const isStop = card==='stop';

  return html`<div onClick=${onClose} style=${{position:'fixed',inset:0,background:'rgba(0,0,0,0.82)',
    display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:50}}>
    <div onClick=${e=>e.stopPropagation()} class="anim" style=${{background:C.surface,borderRadius:'22px 22px 0 0',
      width:'100%',maxWidth:460,padding:'20px 20px 44px',borderTop:`2px solid ${pc}`}}>
      <div style=${{width:36,height:4,background:C.border,borderRadius:2,margin:'0 auto 18px'}}/>

      <div style=${{marginBottom:16}}>
        <div style=${{fontSize:18,fontWeight:800,color:PCL[pi%PC.length]}}>${p.name}'s Zug</div>
        <div style=${{fontSize:12,color:C.muted,marginTop:2}}>
          ${fmtN(total(p))} Punkte · Runde ${p.turns.length+1}
        </div>
      </div>

      <!-- Card picker -->
      <div style=${{marginBottom:14}}>
        <button onClick=${()=>setShowCards(!showCards)} style=${{background:C.surface2,border:`1px solid ${card?pc:C.border}`,
          borderRadius:10,padding:'9px 14px',color:card?pc:C.muted,cursor:'pointer',fontSize:13,width:'100%',textAlign:'left',fontWeight:card?700:400}}>
          ${card ? `${CARDS.find(c=>c.id===card)?.emoji} ${CARDS.find(c=>c.id===card)?.label}` : '🃏 Karte auswählen (optional)'}
          <span style=${{float:'right',color:C.muted2,fontWeight:400}}>${showCards?'▲':'▼'}</span>
        </button>
        ${showCards && html`<div style=${{display:'flex',flexWrap:'wrap',gap:6,marginTop:8,padding:'4px 0'}}>
          ${CARDS.map(c=>html`<button key=${c.id} onClick=${()=>{setCard(card===c.id?null:c.id);setShowCards(false);}}
            style=${{background:card===c.id?c.color:C.surface2,border:`1px solid ${card===c.id?c.color:C.border}`,
              borderRadius:8,padding:'6px 10px',color:C.text,cursor:'pointer',fontSize:12}}>
            ${c.emoji} ${c.label}
          </button>`)}
        </div>`}
      </div>

      <!-- STOP card -->
      ${isStop && html`<div>
        <div style=${{background:'#1c1c2e',borderRadius:12,padding:12,marginBottom:12,fontSize:13,color:C.muted,textAlign:'center'}}>
          🛑 Stop-Karte — du setzt diese Runde aus.
        </div>
        <button onClick=${()=>onRecord({score:0,bust:false,tuttoCycles:0,card:'stop'})}
          style=${{width:'100%',padding:'13px',borderRadius:14,border:'none',background:'#4b5563',color:'white',fontSize:15,fontWeight:700,cursor:'pointer'}}>
          Aussetzen — 0 Punkte
        </button>
      </div>`}

      <!-- Normal scoring -->
      ${!isStop && html`<div>
        ${(()=>{
          const tots = game.players.map(p=>({name:p.name,tot:p.turns.reduce((s,t)=>s+t.score,0)}));
          const maxTot = Math.max(...tots.map(t=>t.tot));
          const myName = game.players[pi].name;
          const leaders = tots.filter(t=>t.tot===maxTot && t.name!==myName).map(t=>t.name);

          // ── PLUS/MINUS ────────────────────────────────────────────────────
          if (card==='plusminus') return html`<div>
            <div style=${{background:'#1a0f00',borderRadius:12,padding:'10px 14px',marginBottom:12,fontSize:12,color:C.muted,lineHeight:1.6}}>
              <strong style=${{color:C.amberL}}>⊕ Plus/Minus:</strong> Pflicht-TUTTO — kein Stopp erlaubt!<br/>
              Bei Erfolg: <strong style=${{color:C.green}}>+1.000 Punkte</strong>
              ${leaders.length>0
                ? html` · <strong style=${{color:C.red}}>${leaders.join(' & ')} −1.000</strong>`
                : html` · <span style=${{color:C.muted2}}>(du führst — kein Abzug)</span>`}
            </div>
            <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <button onClick=${()=>onRecord({score:1000,bust:false,tuttoCycles:1,card:'plusminus'},leaders)}
                style=${{padding:'16px 0',borderRadius:14,border:`2px solid ${C.green}`,background:'#052e16',
                  color:C.green,cursor:'pointer',fontSize:15,fontWeight:900,lineHeight:1.4}}>
                ✓ TUTTO<br/><span style=${{fontSize:11}}>+1.000 Punkte</span>
              </button>
              <button onClick=${()=>onRecord({score:0,bust:true,tuttoCycles:0,card:'plusminus'},[])}
                style=${{padding:'16px 0',borderRadius:14,border:`2px solid ${C.red}`,background:'#2d0a0a',
                  color:C.red,cursor:'pointer',fontSize:15,fontWeight:900,lineHeight:1.4}}>
                ✕ Niete<br/><span style=${{fontSize:11}}>0 Punkte</span>
              </button>
            </div>
          </div>`;

          // ── STRAßE ────────────────────────────────────────────────────────
          if (card==='strasse') return html`<div>
            <div style=${{background:'#1a0f00',borderRadius:12,padding:'10px 14px',marginBottom:10,fontSize:12,color:C.muted,lineHeight:1.6}}>
              <strong style=${{color:C.amberL}}>🛣 Straße:</strong> Alle 6 Zahlen würfeln (Pflicht). Straße = 2.000 Punkte, gilt als TUTTO → Weitermachen möglich.
            </div>
            <button onClick=${()=>{setScore('2000');setBust(false);}}
              style=${{width:'100%',padding:'14px',borderRadius:12,border:`2px solid ${score==='2000'?C.amber:C.border}`,
                background:score==='2000'?'#1c0f00':C.surface2,color:score==='2000'?C.amberL:C.text,
                cursor:'pointer',fontSize:20,fontWeight:900,marginBottom:8}}>
              ✓ Straße — 2.000 Punkte
            </button>
            <input type="number" min="2000" value=${score} onChange=${e=>setScore(e.target.value)}
              placeholder="Weitergespielt? Gesamtpunkte eingeben…"
              style=${{width:'100%',background:C.surface2,border:`2px solid ${bust?C.red:pc}`,borderRadius:14,
                padding:'11px',color:bust?C.muted:C.text,fontSize:18,textAlign:'center',outline:'none',marginBottom:8,opacity:bust?0.4:1}}
              disabled=${bust}/>
            <button onClick=${toggleBust}
              style=${{width:'100%',padding:'12px',borderRadius:12,border:'none',cursor:'pointer',fontWeight:700,fontSize:13,
                background:bust?'#7f1d1d':C.surface2,color:bust?'#fca5a5':C.muted,marginBottom:8}}>
              💥 Niete — 0 Punkte
            </button>
            ${(!bust && score!=='') && html`<button onClick=${submit}
              style=${{width:'100%',padding:'13px',borderRadius:14,border:'none',background:pc,
                color:'#000',fontSize:15,fontWeight:700,cursor:'pointer'}}>
              +${fmtN(Number(score))} Punkte eintragen
            </button>`}
          </div>`;

          // ── Standard (alle anderen Karten inkl. Feuerwerk, Kleeblatt) ────
          return html`<div>
            ${card==='feuerwerk' && html`<div style=${{background:'#1a0000',borderRadius:12,padding:'8px 14px',marginBottom:10,fontSize:12,color:C.muted}}>
              <strong style=${{color:'#fca5a5'}}>🎆 Feuerwerk:</strong> Kein Stopp — würfeln bis zur Niete. Alle erwürfelten Punkte werden gutgeschrieben.
            </div>`}
            ${card==='kleeblatt' && html`<div style=${{background:'#001a0a',borderRadius:12,padding:'8px 14px',marginBottom:10,fontSize:12,color:C.muted}}>
              <strong style=${{color:'#86efac'}}>🍀 Kleeblatt:</strong> 2× TUTTO hintereinander (Pflicht) → Sofortsieg, unabhängig vom Punktestand!
            </div>`}
            ${card==='x2' && html`<div style=${{background:'#1a0030',borderRadius:12,padding:'8px 14px',marginBottom:10,fontSize:12,color:C.muted}}>
              <strong style=${{color:'#c4b5fd'}}>✖ ×2-Karte:</strong> Aufhören jederzeit erlaubt — dann nur normale Punkte.
              Bei TUTTO: <strong style=${{color:'#c4b5fd'}}>alle Punkte dieses Zuges werden verdoppelt.</strong>
              Weitermachen nach TUTTO möglich.
            </div>`}
            ${card==='x2' && tuttoCycles>0 && score!=='' && !bust && html`<div style=${{
              background:'#2e1a50',borderRadius:12,padding:'10px 14px',marginBottom:10,
              display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style=${{fontSize:13,color:'#c4b5fd'}}>✨ TUTTO — ×2 anwenden:</span>
              <div style=${{display:'flex',gap:8,alignItems:'center'}}>
                <span style=${{fontSize:13,color:C.muted,textDecoration:'line-through'}}>${fmtN(Number(score))}</span>
                <span style=${{fontSize:18,fontWeight:900,color:'#c4b5fd'}}>→ ${fmtN(Number(score)*2)}</span>
                <button onClick=${()=>setScore(String(Number(score)*2))}
                  style=${{background:'#7c3aed',border:'none',borderRadius:8,padding:'6px 10px',
                    color:'white',cursor:'pointer',fontSize:12,fontWeight:700}}>×2 ✓</button>
              </div>
            </div>`}
            <div style=${{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
              ${QUICK.map(v=>html`<button key=${v} onClick=${()=>{setScore(String(v));setBust(false);}}
                style=${{background:score===String(v)?pc:C.surface2,border:`1px solid ${score===String(v)?pc:C.border}`,
                  borderRadius:8,padding:'6px 12px',color:score===String(v)?'#000':C.text,cursor:'pointer',fontSize:13,fontWeight:700}}>
                ${fmtN(v)}
              </button>`)}
            </div>
            <input type="number" min="0" value=${score} onChange=${e=>setScore(e.target.value)} autoFocus
              placeholder="Punkte eingeben…"
              style=${{width:'100%',background:C.surface2,border:`2px solid ${bust?C.red:pc}`,borderRadius:14,
                padding:'13px',color:bust?C.muted:C.text,fontSize:22,textAlign:'center',outline:'none',marginBottom:10,opacity:bust?0.4:1}}
              disabled=${bust}/>
            <div style=${{display:'flex',gap:8,marginBottom:10}}>
              <button onClick=${toggleBust} style=${{flex:1,padding:'10px',borderRadius:12,border:'none',cursor:'pointer',fontWeight:700,fontSize:13,
                background:bust?'#7f1d1d':C.surface2,color:bust?'#fca5a5':C.muted}}>
                💥 Niete (0)
              </button>
              <div style=${{flex:1,display:'flex',alignItems:'center',borderRadius:12,overflow:'hidden',
                border:`1px solid ${tuttoCycles>0?C.green:C.border}`,background:tuttoCycles>0?'#052e16':C.surface2,opacity:bust?0.4:1}}>
                <button onClick=${()=>!bust&&setTuttoCycles(Math.max(0,tuttoCycles-1))} disabled=${bust||tuttoCycles===0}
                  style=${{flex:'0 0 36px',background:'none',border:'none',color:C.muted,cursor:'pointer',
                    fontSize:18,fontWeight:900,opacity:tuttoCycles===0?0.3:1}}>−</button>
                <div style=${{flex:1,textAlign:'center',fontSize:12,fontWeight:700,
                  color:tuttoCycles>0?C.green:C.muted,userSelect:'none'}}>
                  ${tuttoCycles===0?'kein TUTTO':tuttoCycles===1?'✨ 1× TUTTO':`✨ ${tuttoCycles}× TUTTO`}
                </div>
                <button onClick=${()=>!bust&&setTuttoCycles(tuttoCycles+1)} disabled=${bust}
                  style=${{flex:'0 0 36px',background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:18,fontWeight:900}}>+</button>
              </div>
            </div>
            ${card==='kleeblatt' && tuttoCycles>=1 && html`<button onClick=${()=>onRecord({score:0,bust:false,tuttoCycles:2,card:'kleeblatt',instant:true},[])}
              style=${{width:'100%',background:'#15803d',border:'none',borderRadius:12,padding:'11px',
                color:'white',cursor:'pointer',fontWeight:700,fontSize:14,marginBottom:10}}>
              🍀 2× TUTTO → Kleeblatt-Sieg!
            </button>`}
            <button onClick=${submit} disabled=${!bust&&score===''} style=${{
              width:'100%',padding:'13px',borderRadius:14,border:'none',
              background:bust?C.red:score===''?C.muted2:pc,
              color:'white',fontSize:15,fontWeight:700,cursor:'pointer',opacity:score===''&&!bust?0.5:1}}>
              ${bust?'Niete eintragen':score!==''?`+${fmtN(Number(score))} Punkte eintragen`:'Punkte eingeben…'}
            </button>
          </div>`;
        })()}
      </div>`}
    </div>
  </div>`;
}

// ═══ STATISTICS ══════════════════════════════════════════════════════════════

function Stats({games,roster,tab,setTab,selPlayer,setSelPlayer,cmp,setCmp,onBack}) {
  if (!games.length) return html`<div style=${{maxWidth:460,margin:'0 auto',padding:'60px 20px',textAlign:'center'}}>
    <button onClick=${onBack} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:16,display:'block',marginBottom:32}}>‹ Zurück</button>
    <div style=${{fontSize:40,marginBottom:12}}>📊</div>
    <div style=${{color:C.muted}}>Noch keine Spiele gespeichert.</div>
  </div>`;

  // ── Per-player statistics ─────────────────────────────────────────────────
  const playerStats = roster.map(name => {
    const pg         = games.filter(g=>g.players.some(p=>p.name===name));
    const getP       = g => g.players.find(p=>p.name===name);
    const wins       = pg.filter(g=>g.winner===name).length;
    const allTurns   = pg.flatMap(g=>getP(g).turns).filter(t=>!t.isDeduction);
    const bustTs     = allTurns.filter(t=>t.bust||t.score===0);
    // backward compat: old data may have tutto:boolean, new data has tuttoCycles:number
    const getCycles  = t => t.tuttoCycles ?? (t.tutto ? 1 : 0);
    const tuttoTs    = allTurns.filter(t=>getCycles(t)>0);
    const multiTuttoTs = allTurns.filter(t=>getCycles(t)>=2);
    const scoringTs  = allTurns.filter(t=>t.score>0);
    const finalScores= pg.map(g=>total(getP(g)));
    return {
      name, n:pg.length, wins,
      winRate:  pg.length ? Math.round(wins/pg.length*100) : 0,
      avgFinal: avg(finalScores),
      bestFinal:finalScores.length ? Math.max(...finalScores) : 0,
      worstFinal:finalScores.length ? Math.min(...finalScores) : 0,
      totalTurns:  allTurns.length,
      bustRate:    allTurns.length ? Math.round(bustTs.length/allTurns.length*100)  : 0,
      tuttoRate:   allTurns.length ? Math.round(tuttoTs.length/allTurns.length*100) : 0,
      multiTuttoRate: allTurns.length ? Math.round(multiTuttoTs.length/allTurns.length*100) : 0,
      avgPerTurn:  allTurns.length  ? Math.round(allTurns.reduce((s,t)=>s+t.score,0)/allTurns.length)  : 0,
      avgPerScore: scoringTs.length ? Math.round(scoringTs.reduce((s,t)=>s+t.score,0)/scoringTs.length): 0,
      bestTurn:    scoringTs.length ? Math.max(...scoringTs.map(t=>t.score)) : 0,
      finalScores, allTurns,
    };
  }).filter(p=>p.n>0);

  const TABS=[{id:'leaderboard',l:'Rangliste'},{id:'player',l:'Spieler'},{id:'compare',l:'Vergleich'},{id:'turns',l:'Züge'},{id:'overall',l:'Gesamt'}];
  const selP  = selPlayer || playerStats[0]?.name;
  const selSt = playerStats.find(p=>p.name===selP);

  const Sel = ({val,set,label}) => html`<div style=${{marginBottom:14}}>
    ${label && html`<div style=${{fontSize:11,color:C.muted2,letterSpacing:1,textTransform:'uppercase',marginBottom:5,fontWeight:700}}>${label}</div>`}
    <div style=${{position:'relative'}}>
      <select value=${val||''} onChange=${e=>set(e.target.value)}
        style=${{width:'100%',background:C.surface2,border:`1px solid ${C.border}`,borderRadius:12,
          padding:'10px 36px 10px 14px',color:C.text,fontSize:14,outline:'none',cursor:'pointer'}}>
        <option value="">Spieler wählen…</option>
        ${playerStats.map(p=>html`<option key=${p.name} value=${p.name}>${p.name}</option>`)}
      </select>
      <span style=${{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',color:C.muted,pointerEvents:'none'}}>▾</span>
    </div>
  </div>`;

  // ─────────────────────────────────────────────────────────────────────────
  return html`<div style=${{maxWidth:460,margin:'0 auto'}}>
    <div style=${{position:'sticky',top:0,background:C.bg,zIndex:10,padding:'12px 16px',borderBottom:`1px solid ${C.border}`}}>
      <div style=${{display:'flex',alignItems:'center',gap:12}}>
        <button onClick=${onBack} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20,padding:0}}>‹</button>
        <span style=${{fontWeight:800,fontSize:18,flex:1}}>Statistiken</span>
        <span style=${{fontSize:12,color:C.muted2}}>${games.length} Spiele</span>
      </div>
      <div style=${{display:'flex',marginTop:10,borderBottom:`1px solid ${C.border}`,overflowX:'auto'}}>
        ${TABS.map(t=>html`<button key=${t.id} onClick=${()=>setTab(t.id)} style=${{
          flexShrink:0,background:'none',border:'none',cursor:'pointer',padding:'8px 12px',fontSize:12,fontWeight:600,
          color:tab===t.id?C.amberL:C.muted,borderBottom:tab===t.id?`2px solid ${C.amber}`:'2px solid transparent'}}>${t.l}</button>`)}
      </div>
    </div>

    <div style=${{padding:16}}>

      <!-- ── RANGLISTE ─────────────────────────────────────────────────── -->
      ${tab==='leaderboard' && html`<div>
        <div style=${{fontSize:12,color:C.muted,marginBottom:14}}>Nach Gewinnrate sortiert; bei Gleichstand nach Ø-Endpunktzahl.</div>
        ${[...playerStats].sort((a,b)=>b.winRate-a.winRate||b.avgFinal-a.avgFinal).map((p,rank)=>{
          const ci=roster.indexOf(p.name);
          return html`<div key=${p.name} style=${{background:C.surface,borderRadius:16,padding:'12px 16px',marginBottom:8,
            display:'grid',gridTemplateColumns:'28px 1fr auto',gap:12,alignItems:'center',borderLeft:`3px solid ${PC[ci%PC.length]}`}}>
            <div style=${{fontSize:18,fontWeight:900,color:rank===0?C.amberL:C.muted2}}>${rank+1}.</div>
            <div>
              <div style=${{fontWeight:700,fontSize:15,color:PCL[ci%PC.length]}}>${p.name}</div>
              <div style=${{fontSize:11,color:C.muted,marginTop:2}}>
                ${p.n} Spiele · ${p.wins} Siege · TUTTO ${p.tuttoRate}% · Niete ${p.bustRate}%
              </div>
            </div>
            <div style=${{textAlign:'right'}}>
              <div style=${{fontSize:22,fontWeight:900,color:PC[ci%PC.length]}}>${p.winRate}%</div>
              <div style=${{fontSize:10,color:C.muted}}>Ø ${fmtN(p.avgFinal)}</div>
            </div>
          </div>`;
        })}
        ${playerStats.length>1 && html`<div style=${{background:C.surface,borderRadius:16,padding:14,marginTop:12}}>
          <div style=${{fontSize:13,fontWeight:700,marginBottom:8}}>Ø Endpunktzahl</div>
          <div style=${{height:150}}>
            <${ResponsiveContainer} width="100%" height="100%">
              <${BarChart} data=${[...playerStats].sort((a,b)=>b.avgFinal-a.avgFinal)} layout="vertical" margin=${{left:0,right:30}}>
                <${XAxis} type="number" hide=${true}/>
                <${YAxis} type="category" dataKey="name" tick=${{fill:C.muted,fontSize:11}} axisLine=${false} tickLine=${false} width=${70}/>
                <${Tooltip} contentStyle=${{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10}} cursor=${{fill:'rgba(255,255,255,0.05)'}} formatter=${v=>[fmtN(v),'Ø Punkte']}/>
                <${Bar} dataKey="avgFinal" name="Ø Punkte" radius=${[0,5,5,0]}>
                  ${[...playerStats].sort((a,b)=>b.avgFinal-a.avgFinal).map(p=>html`<${Cell} key=${p.name} fill=${PC[roster.indexOf(p.name)%PC.length]}/>`)}
                </${Bar}>
              </${BarChart}>
            </${ResponsiveContainer}>
          </div>
        </div>`}
      </div>`}

      <!-- ── SPIELER ───────────────────────────────────────────────────── -->
      ${tab==='player' && html`<div>
        <${Sel} val=${selP} set=${setSelPlayer} label="Spieler auswählen"/>
        ${selSt && (()=>{
          const ci=roster.indexOf(selSt.name);
          return html`<div>
            <div style=${{background:C.surface,borderRadius:16,padding:14,marginBottom:10,borderTop:`3px solid ${PC[ci%PC.length]}`}}>
              <div style=${{fontSize:15,fontWeight:800,color:PCL[ci%PC.length],marginBottom:10}}>${selSt.name}</div>
              <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7}}>
                <${StatCard} label="Spiele"          val=${selSt.n}/>
                <${StatCard} label="Siege"           val=${selSt.wins}           color=${C.amber}/>
                <${StatCard} label="Gewinnrate"      val=${selSt.winRate+'%'}    color=${C.amber}/>
                <${StatCard} label="Ø Endpunktzahl"  val=${fmtN(selSt.avgFinal)}/>
                <${StatCard} label="Bestes Spiel"    val=${fmtN(selSt.bestFinal)}  color=${C.green}/>
                <${StatCard} label="Schlechtestes"   val=${fmtN(selSt.worstFinal)} color=${C.red}/>
                <${StatCard} label="Bester Zug"      val=${fmtN(selSt.bestTurn)}   color=${C.green}/>
                <${StatCard} label="Ø / Zug (alle)"  val=${fmtN(selSt.avgPerTurn)}/>
                <${StatCard} label="Ø / Zug (o. Niete)" val=${fmtN(selSt.avgPerScore)} color=${C.amberL}
                  sub="nur Züge > 0"/>
              </div>
            </div>

            <div style=${{background:C.surface,borderRadius:16,padding:14,marginBottom:10}}>
              <div style=${{fontSize:13,fontWeight:700,marginBottom:10}}>Risiko-Profil (${selSt.totalTurns} Züge)</div>
              <${RateBar} label="TUTTO-Rate — mind. 1× alle 6 Würfel abgeräumt"    val=${selSt.tuttoRate}      color=${C.green}/>
              <${RateBar} label="Weiterspielen nach TUTTO (2× oder mehr pro Zug)"  val=${selSt.multiTuttoRate} color=${C.amber}/>
              <${RateBar} label="Niete-Rate — ohne Punkte geendet"                 val=${selSt.bustRate}       color=${C.red}/>
              <div style=${{marginTop:10,fontSize:11,color:C.muted,lineHeight:1.5}}>
                ${selSt.multiTuttoRate > 20
                  ? `${selSt.name} wagt es oft, nach dem ersten TUTTO weiterzuspielen — hohes Risiko!`
                  : selSt.tuttoRate > selSt.bustRate
                  ? `Mehr TUTTOs als Nieten — ${selSt.name} spielt mutig, aber kontrolliert.`
                  : selSt.bustRate > 20
                  ? `Hohe Niete-Rate — ${selSt.name} geht oft zu weit.`
                  : `Konservative Spielweise — ${selSt.name} nimmt lieber sichere Punkte mit.`}
              </div>
            </div>

            ${selSt.finalScores.length>1 && html`<div style=${{background:C.surface,borderRadius:16,padding:14}}>
              <div style=${{fontSize:13,fontWeight:700,marginBottom:8}}>Endpunktzahl-Verlauf</div>
              <div style=${{height:140}}>
                <${ResponsiveContainer} width="100%" height="100%">
                  <${BarChart} data=${selSt.finalScores.map((s,i)=>({i:i+1,score:s}))}>
                    <${XAxis} dataKey="i" tick=${{fill:C.muted,fontSize:10}} axisLine=${false} tickLine=${false}/>
                    <${YAxis} hide=${true}/>
                    <${Tooltip} contentStyle=${{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10}}
                      cursor=${{fill:'rgba(255,255,255,0.05)'}} formatter=${v=>[fmtN(v),'Punkte']}/>
                    <${Bar} dataKey="score" name="Punkte" fill=${PC[ci%PC.length]} radius=${[3,3,0,0]}/>
                  </${BarChart}>
                </${ResponsiveContainer}>
              </div>
              <div style=${{fontSize:10,color:C.muted,marginTop:4}}>Durchschnitt: ${fmtN(selSt.avgFinal)} · Bestes Spiel: ${fmtN(selSt.bestFinal)}</div>
            </div>`}
          </div>`;
        })()}
      </div>`}

      <!-- ── VERGLEICH ─────────────────────────────────────────────────── -->
      ${tab==='compare' && html`<div>
        <${Sel} val=${cmp[0]} set=${v=>setCmp([v,cmp[1]])} label="Spieler 1"/>
        <${Sel} val=${cmp[1]} set=${v=>setCmp([cmp[0],v])} label="Spieler 2"/>
        ${cmp[0]&&cmp[1]&&cmp[0]!==cmp[1] && (()=>{
          const p1=cmp[0], p2=cmp[1];
          const shared=games.filter(g=>g.players.some(p=>p.name===p1)&&g.players.some(p=>p.name===p2));
          if (!shared.length) return html`<div style=${{color:C.muted,textAlign:'center',padding:20}}>Keine gemeinsamen Spiele.</div>`;
          const getS=(g,name)=>total(g.players.find(p=>p.name===name));
          const p1wins=shared.filter(g=>getS(g,p1)>getS(g,p2)).length;
          const p2wins=shared.filter(g=>getS(g,p2)>getS(g,p1)).length;
          const ties=shared.length-p1wins-p2wins;
          const c1=PC[roster.indexOf(p1)%PC.length],c2=PC[roster.indexOf(p2)%PC.length];
          const cl1=PCL[roster.indexOf(p1)%PC.length],cl2=PCL[roster.indexOf(p2)%PC.length];
          const p1tots=shared.map(g=>getS(g,p1)), p2tots=shared.map(g=>getS(g,p2));
          const p1st=playerStats.find(p=>p.name===p1), p2st=playerStats.find(p=>p.name===p2);
          return html`<div>
            <div style=${{background:C.surface,borderRadius:16,padding:16,marginBottom:10}}>
              <div style=${{fontSize:12,color:C.muted,marginBottom:12}}>${shared.length} gemeinsame Spiele</div>
              <div style=${{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:12,alignItems:'center',textAlign:'center'}}>
                <div>
                  <div style=${{fontSize:13,color:cl1,fontWeight:700,marginBottom:4}}>${p1}</div>
                  <div style=${{fontSize:38,fontWeight:900,color:p1wins>p2wins?cl1:C.muted}}>${p1wins}</div>
                  <div style=${{fontSize:10,color:C.muted}}>Siege</div>
                </div>
                <div style=${{color:C.muted2,fontSize:18,fontWeight:900}}>vs</div>
                <div>
                  <div style=${{fontSize:13,color:cl2,fontWeight:700,marginBottom:4}}>${p2}</div>
                  <div style=${{fontSize:38,fontWeight:900,color:p2wins>p1wins?cl2:C.muted}}>${p2wins}</div>
                  <div style=${{fontSize:10,color:C.muted}}>Siege</div>
                </div>
              </div>
              ${ties>0 && html`<div style=${{textAlign:'center',marginTop:8,fontSize:12,color:C.muted2}}>${ties} Unentschieden</div>`}
            </div>
            <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              ${[[p1,p1tots,cl1,p1st],[p2,p2tots,cl2,p2st]].map(([name,tots,cl,st])=>html`<div key=${name}
                style=${{background:C.surface,borderRadius:14,padding:12}}>
                <div style=${{fontSize:11,color:cl,fontWeight:700,marginBottom:7}}>${name}</div>
                ${[
                  ['Ø Endpunktzahl', fmtN(avg(tots))],
                  ['Bestes Spiel',   fmtN(Math.max(...tots))],
                  ['TUTTO-Rate',     (st?.tuttoRate||0)+'%'],
                  ['Niete-Rate',     (st?.bustRate||0)+'%'],
                  ['Ø pro Zug',      fmtN(st?.avgPerTurn||0)],
                ].map(([l,v])=>html`<div key=${l} style=${{display:'flex',justifyContent:'space-between',
                  padding:'3px 0',borderBottom:`1px solid ${C.border}`}}>
                  <span style=${{fontSize:10,color:C.muted}}>${l}</span>
                  <span style=${{fontSize:11,fontWeight:700}}>${v}</span>
                </div>`)}
              </div>`)}
            </div>
            ${shared.length>1 && html`<div style=${{background:C.surface,borderRadius:16,padding:14}}>
              <div style=${{fontSize:13,fontWeight:700,marginBottom:8}}>Punktverlauf (gemeinsame Spiele)</div>
              <div style=${{height:140}}>
                <${ResponsiveContainer} width="100%" height="100%">
                  <${BarChart} data=${shared.map((g,i)=>({i:i+1,[p1]:getS(g,p1),[p2]:getS(g,p2)}))} barCategoryGap="20%">
                    <${XAxis} dataKey="i" tick=${{fill:C.muted,fontSize:10}} axisLine=${false} tickLine=${false}/>
                    <${YAxis} hide=${true}/>
                    <${Tooltip} contentStyle=${{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10}}
                      cursor=${{fill:'rgba(255,255,255,0.05)'}} formatter=${v=>[fmtN(v),'']}/>
                    <${Bar} dataKey=${p1} fill=${c1} radius=${[3,3,0,0]}/>
                    <${Bar} dataKey=${p2} fill=${c2} radius=${[3,3,0,0]}/>
                  </${BarChart}>
                </${ResponsiveContainer}>
              </div>
              <div style=${{display:'flex',gap:16,justifyContent:'center',marginTop:6,fontSize:11,color:C.muted}}>
                <span><span style=${{color:c1}}>■</span> ${p1}</span>
                <span><span style=${{color:c2}}>■</span> ${p2}</span>
              </div>
            </div>`}
          </div>`;
        })()}
      </div>`}

      <!-- ── ZÜGE ──────────────────────────────────────────────────────── -->
      ${tab==='turns' && html`<div>
        <div style=${{fontSize:12,color:C.muted,marginBottom:14}}>Analyse aller eingetragenen Einzelzüge.</div>

        <!-- TUTTO + Niete-Rate per player -->
        <div style=${{background:C.surface,borderRadius:16,padding:14,marginBottom:10}}>
          <div style=${{fontSize:13,fontWeight:700,marginBottom:12}}>Niete- & TUTTO-Rate pro Spieler</div>
          ${playerStats.map(p=>{
            const ci=roster.indexOf(p.name);
            return html`<div key=${p.name} style=${{marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
              <div style=${{fontSize:12,color:PCL[ci%PC.length],fontWeight:700,marginBottom:6}}>
                ${p.name} <span style=${{color:C.muted,fontWeight:400}}>(${p.totalTurns} Züge)</span>
              </div>
              <${RateBar} label="TUTTO" val=${p.tuttoRate} color=${C.green}/>
              <${RateBar} label="Niete" val=${p.bustRate}  color=${C.red}/>
            </div>`;
          })}
        </div>

        <!-- Top single turns -->
        <div style=${{background:C.surface,borderRadius:16,padding:14,marginBottom:10}}>
          <div style=${{fontSize:13,fontWeight:700,marginBottom:10}}>🏆 Top Einzelzüge</div>
          ${(()=>{
            const top=games.flatMap(g=>g.players.flatMap(p=>
              p.turns.map(t=>({name:p.name,score:t.score,tuttoCycles:(t.tuttoCycles??(t.tutto?1:0)),card:t.card,gDate:g.date}))
            )).filter(t=>t.score>0).sort((a,b)=>b.score-a.score).slice(0,10);
            return top.map((t,i)=>{
              const ci=roster.indexOf(t.name);
              const card=CARDS.find(c=>c.id===t.card);
              return html`<div key=${i} style=${{display:'flex',alignItems:'center',gap:10,
                padding:'7px 0',borderBottom:`1px solid ${C.border}`}}>
                <div style=${{fontSize:14,fontWeight:900,color:i===0?C.amberL:C.muted2,minWidth:22}}>${i+1}.</div>
                <div style=${{flex:1,minWidth:0}}>
                  <span style=${{color:PCL[ci%PC.length],fontSize:13,fontWeight:600}}>${t.name}</span>
                  ${t.tuttoCycles>0 && html`<span style=${{fontSize:9,background:'#052e16',color:'#86efac',borderRadius:4,padding:'2px 5px',marginLeft:6}}>${t.tuttoCycles===1?'TUTTO':`${t.tuttoCycles}× TUTTO`}</span>`}
                  ${card && html`<span style=${{fontSize:10,color:C.muted,marginLeft:6}}>${card.emoji}</span>`}
                  <span style=${{fontSize:10,color:C.muted2,marginLeft:6,display:'block'}}>${t.gDate}</span>
                </div>
                <div style=${{fontSize:16,fontWeight:900,color:PC[ci%PC.length]}}>${fmtN(t.score)}</div>
              </div>`;
            });
          })()}
        </div>

        <!-- Avg per turn comparison (bar) -->
        ${playerStats.length>1 && html`<div style=${{background:C.surface,borderRadius:16,padding:14}}>
          <div style=${{fontSize:13,fontWeight:700,marginBottom:6}}>Ø Punkte pro Zug</div>
          <div style=${{fontSize:11,color:C.muted,marginBottom:10}}>Inkl. Nieten (0-Punkte-Züge).</div>
          <div style=${{height:130}}>
            <${ResponsiveContainer} width="100%" height="100%">
              <${BarChart} data=${[...playerStats].sort((a,b)=>b.avgPerTurn-a.avgPerTurn)} layout="vertical" margin=${{left:0,right:40}}>
                <${XAxis} type="number" hide=${true}/>
                <${YAxis} type="category" dataKey="name" tick=${{fill:C.muted,fontSize:11}} axisLine=${false} tickLine=${false} width=${70}/>
                <${Tooltip} contentStyle=${{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10}}
                  cursor=${{fill:'rgba(255,255,255,0.05)'}} formatter=${v=>[fmtN(v),'Ø/Zug']}/>
                <${Bar} dataKey="avgPerTurn" name="Ø/Zug" radius=${[0,5,5,0]}>
                  ${[...playerStats].sort((a,b)=>b.avgPerTurn-a.avgPerTurn).map(p=>html`<${Cell} key=${p.name} fill=${PC[roster.indexOf(p.name)%PC.length]}/>`)}
                </${Bar}>
              </${BarChart}>
            </${ResponsiveContainer}>
          </div>
        </div>`}
      </div>`}

      <!-- ── GESAMT ─────────────────────────────────────────────────────── -->
      ${tab==='overall' && (()=>{
        const allTurns   = games.flatMap(g=>g.players.flatMap(p=>p.turns)).filter(t=>!t.isDeduction);
        const bustTs     = allTurns.filter(t=>t.bust||t.score===0);
        const tuttoTs    = allTurns.filter(t=>(t.tuttoCycles??(t.tutto?1:0))>0);
        const roundsPG   = games.map(g=>Math.max(...g.players.map(p=>p.turns.length)));
        const kleeWins   = games.filter(g=>g.players.some(p=>p.turns.some(t=>t.instant))).length;
        const allPlayers = [...new Set(games.flatMap(g=>g.players.map(p=>p.name)))].length;
        const highScore  = Math.max(...games.flatMap(g=>g.players.map(p=>total(p))));

        // Score distribution across all turns
        const buckets=[0,50,100,150,200,300,500,1000,Infinity];
        const blabels=['0','50','100','150','200','300','500','1000+'];
        const dist=blabels.map((l,i)=>({
          l, n:allTurns.filter(t=>t.score>=buckets[i]&&t.score<buckets[i+1]).length
        }));

        // Card frequency
        const cardFreq=CARDS.map(c=>({
          label:c.label,emoji:c.emoji,
          n:allTurns.filter(t=>t.card===c.id).length
        })).filter(c=>c.n>0).sort((a,b)=>b.n-a.n);

        return html`<div>
          <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7,marginBottom:12}}>
            <${StatCard} label="Gesamt-Spiele"   val=${games.length}/>
            <${StatCard} label="Spieler gesamt"  val=${allPlayers}/>
            <${StatCard} label="Kleeblatt-Siege" val=${kleeWins} color=${C.green}/>
            <${StatCard} label="Alle Züge"       val=${allTurns.length}/>
            <${StatCard} label="Niete-Rate"      val=${Math.round(bustTs.length/Math.max(allTurns.length,1)*100)+'%'}  color=${C.red}/>
            <${StatCard} label="TUTTO-Rate"      val=${Math.round(tuttoTs.length/Math.max(allTurns.length,1)*100)+'%'} color=${C.green}/>
            <${StatCard} label="Ø Runden/Spiel"  val=${avg(roundsPG).toFixed(1)}/>
            <${StatCard} label="Kürzestes Spiel" val=${roundsPG.length?Math.min(...roundsPG):'-'} sub="Runden"/>
            <${StatCard} label="High Score" val=${fmtN(highScore)} color=${C.amberL}/>
          </div>

          <!-- Score distribution -->
          <div style=${{background:C.surface,borderRadius:16,padding:14,marginBottom:10}}>
            <div style=${{fontSize:13,fontWeight:700,marginBottom:4}}>Häufigkeit nach Zugpunkten</div>
            <div style=${{fontSize:11,color:C.muted,marginBottom:10}}>Wie oft wurde ein Zug in diesem Punktebereich abgeschlossen?</div>
            <div style=${{height:140}}>
              <${ResponsiveContainer} width="100%" height="100%">
                <${BarChart} data=${dist}>
                  <${XAxis} dataKey="l" tick=${{fill:C.muted,fontSize:10}} axisLine=${false} tickLine=${false}/>
                  <${YAxis} hide=${true}/>
                  <${Tooltip} contentStyle=${{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10}}
                    cursor=${{fill:'rgba(255,255,255,0.05)'}} formatter=${v=>[`${v} Züge`,'']}/>
                  <${Bar} dataKey="n" name="Züge" radius=${[3,3,0,0]}>
                    ${dist.map((_,i)=>html`<${Cell} key=${i} fill=${i===0?C.red:PC[i%PC.length]}/>`)}
                  </${Bar}>
                </${BarChart}>
              </${ResponsiveContainer}>
            </div>
          </div>

          <!-- Card usage -->
          ${cardFreq.length>0 && html`<div style=${{background:C.surface,borderRadius:16,padding:14,marginBottom:10}}>
            <div style=${{fontSize:13,fontWeight:700,marginBottom:10}}>Kartennutzung (gesamt eingetragen)</div>
            ${cardFreq.map(c=>html`<div key=${c.label} style=${{display:'flex',alignItems:'center',gap:10,padding:'5px 0',borderBottom:`1px solid ${C.border}`}}>
              <span style=${{fontSize:14}}>${c.emoji}</span>
              <span style=${{fontSize:12,flex:1}}>${c.label}</span>
              <span style=${{fontSize:13,fontWeight:700,color:C.amberL}}>${c.n}×</span>
            </div>`)}
          </div>`}

          <!-- Recent games -->
          <div style=${{background:C.surface,borderRadius:16,padding:14}}>
            <div style=${{fontSize:13,fontWeight:700,marginBottom:10}}>Letzte 5 Spiele</div>
            ${[...games].reverse().slice(0,5).map(g=>{
              const tots=g.players.map(p=>({name:p.name,t:total(p)}));
              const maxT=Math.max(...tots.map(t=>t.t));
              const rounds=Math.max(...g.players.map(p=>p.turns.length),0);
              return html`<div key=${g.id} style=${{padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
                <div style=${{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style=${{color:C.muted,fontSize:12}}>${g.date}</span>
                  <span style=${{color:C.muted2,fontSize:11}}>${rounds} Runden · ${g.players.length} Spieler</span>
                </div>
                <div style=${{display:'flex',flexWrap:'wrap',gap:6}}>
                  ${tots.map((t,i)=>html`<span key=${i} style=${{fontSize:12,color:t.t===maxT?C.amberL:C.muted}}>
                    ${t.name}: <strong>${fmtN(t.t)}</strong>
                  </span>`)}
                </div>
                ${g.winner && html`<div style=${{fontSize:10,color:C.amber,marginTop:2}}>🏆 ${g.winner}</div>`}
              </div>`;
            })}
          </div>
        </div>`;
      })()}

    </div>
  </div>`;
}

// ═══ GITHUB SETTINGS ═════════════════════════════════════════════════════════

function GhSettings({initial,onSave,onBack}) {
  const [token,   setToken]   = useState(initial?.token||'');
  const [owner,   setOwner]   = useState(initial?.owner||'');
  const [repo,    setRepo]    = useState(initial?.repo||'');
  const [testing, setTesting] = useState(false);
  const [res,     setRes]     = useState(null);

  const test = async () => {
    setTesting(true); setRes(null);
    try {
      const r=await fetch(`https://api.github.com/repos/${owner}/${repo}`,{headers:{Authorization:`token ${token}`}});
      setRes(r.ok?{ok:true,msg:'✓ Verbindung erfolgreich!'}:{ok:false,msg:`Fehler ${r.status}`});
    } catch { setRes({ok:false,msg:'Netzwerkfehler.'}); }
    setTesting(false);
  };
  const F=({label,val,set,type='text',ph})=>html`<div style=${{marginBottom:12}}>
    <label style=${{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:1,textTransform:'uppercase',display:'block',marginBottom:5}}>${label}</label>
    <input type=${type} value=${val} onChange=${e=>set(e.target.value)} placeholder=${ph}
      style=${{width:'100%',background:C.surface2,border:`1px solid ${C.border}`,borderRadius:12,padding:'11px 14px',color:C.text,fontSize:15,outline:'none'}}/>
  </div>`;

  return html`<div style=${{maxWidth:400,margin:'0 auto',padding:'20px'}}>
    <div style=${{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
      <button onClick=${onBack} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20}}>‹</button>
      <span style=${{fontSize:20,fontWeight:800}}>☁ GitHub Sync</span>
    </div>
    <div style=${{background:C.surface,borderRadius:14,padding:14,marginBottom:16,fontSize:12,color:C.muted,lineHeight:1.7}}>
      Spielstände werden in <code style=${{color:C.amberL}}>tuttodata.json</code> deines privaten GitHub-Repos gespeichert und geräteübergreifend synchronisiert.
    </div>
    <${F} label="Personal Access Token" val=${token} set=${setToken} type="password" ph="ghp_..."/>
    <${F} label="GitHub-Nutzername"     val=${owner} set=${setOwner} ph="username"/>
    <${F} label="Repository-Name"       val=${repo}  set=${setRepo}  ph="tutto-data"/>
    <div style=${{display:'flex',gap:10,marginTop:8}}>
      <button onClick=${test} disabled=${testing||!token||!owner||!repo}
        style=${{flex:1,background:C.surface2,border:`1px solid ${C.border}`,borderRadius:12,padding:'11px',
          color:C.text,cursor:'pointer',fontSize:14,fontWeight:600,opacity:(!token||!owner||!repo)?0.4:1}}>
        ${testing?'…':'Testen'}
      </button>
      <button onClick=${()=>onSave({token,owner,repo})} disabled=${!token||!owner||!repo}
        style=${{flex:2,background:C.amber,border:'none',borderRadius:12,padding:'11px',color:'#000',
          cursor:'pointer',fontSize:14,fontWeight:700,opacity:(!token||!owner||!repo)?0.4:1}}>
        Aktivieren
      </button>
    </div>
    ${res && html`<div style=${{marginTop:12,padding:'10px 14px',borderRadius:10,
      background:res.ok?'#052e16':'#2d0a0a',color:res.ok?C.green:C.red,fontSize:13}}>${res.msg}</div>`}
    ${initial?.token && html`<button onClick=${()=>onSave(null)} style=${{background:'none',border:'none',
      color:C.muted,cursor:'pointer',fontSize:12,marginTop:14,display:'block',width:'100%',textAlign:'center'}}>
      Sync deaktivieren</button>`}
  </div>`;
}

// ═══ BOOT ════════════════════════════════════════════════════════════════════

if ('serviceWorker' in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
