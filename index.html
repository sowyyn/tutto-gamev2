<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tutto V2</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Tutto">
  <meta name="theme-color" content="#d97706">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #0e0900; color: #fff8e6; font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
           -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
    input[type=number] { -moz-appearance: textfield; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    select { -webkit-appearance: none; appearance: none; }
    @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
    .anim { animation: slideUp 0.22s ease; }
    button { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { createElement as h, useState, useEffect } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';
import htm from 'https://esm.sh/htm@3';
const html = htm.bind(h);

// ═══ CONSTANTS ═══════════════════════════════════════════════════════════════
const TARGET = 6000;
const CARDS = [
  { id:'bonus200',  label:'Bonus 200',  emoji:'🎁', color:'#b45309', bonus: 200 },
  { id:'bonus300',  label:'Bonus 300',  emoji:'🎁', color:'#b45309', bonus: 300 },
  { id:'bonus400',  label:'Bonus 400',  emoji:'🎁', color:'#a16207', bonus: 400 },
  { id:'bonus500',  label:'Bonus 500',  emoji:'🎁', color:'#92400e', bonus: 500 },
  { id:'bonus600',  label:'Bonus 600',  emoji:'🎁', color:'#92400e', bonus: 600 },
  { id:'x2',        label:'×2',         emoji:'✖',  color:'#7c3aed', mult: 2 },
  { id:'stop',      label:'Stop',       emoji:'🛑', color:'#6b7280' },
  { id:'feuerwerk', label:'Feuerwerk',  emoji:'🎆', color:'#dc2626' },
  { id:'plusminus', label:'Plus/Minus', emoji:'⊕',  color:'#0284c7' },
  { id:'kleeblatt', label:'Kleeblatt',  emoji:'🍀', color:'#16a34a' },
  { id:'strasse',   label:'Straße',     emoji:'🛣',  color:'#d97706' },
];

const C = {
  bg:'#0e0900', surface:'#1c1200', surface2:'#281a00', border:'#3d2800',
  text:'#fff8e6', muted:'#a08040', muted2:'#5a4020',
  amber:'#f59e0b', amberL:'#fde68a',
  red:'#ef4444', green:'#22c55e',
};
const PC = ['#f59e0b','#ef4444','#10b981','#818cf8','#f97316','#e879f9','#38bdf8'];

// ═══ HELPERS ═════════════════════════════════════════════════════════════════
const total = p => p.turns.reduce((s,t) => s + (t.score || 0), 0);
const ls = (k,d) => { try{const v=localStorage.getItem(k); return v?JSON.parse(v):d;}catch{return d;} };
const lsSet = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v));}catch{} };
const lsDel = k => { try{localStorage.removeItem(k);}catch{} };

// ═══ APP ═════════════════════════════════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState('home');
  const [cur, setCur] = useState(() => ls('tt:current', null));
  const [players, setPlayers] = useState([]);

  useEffect(() => {
    lsSet('tt:current', cur);
  }, [cur]);

  const startGame = (selectedPlayers) => {
    setCur({
      id: Date.now().toString(),
      players: selectedPlayers.map(name => ({ name, turns: [] })),
      currentPlayerIdx: 0
    });
    setScreen('game');
  };

  if (screen === 'home') {
    return html`
      <div style=${{padding:20, textAlign:'center'}}>
        <h1 style=${{color:C.amber, marginBottom:30, marginTop:40}}>Tutto V2</h1>
        ${cur ? html`
          <button onClick=${() => setScreen('game')} style=${{background:C.amber, color:'#000', padding:'15px', borderRadius:10, width:'100%', fontSize:18, fontWeight:'bold', border:'none', marginBottom:20}}>
            Aktuelles Spiel fortsetzen
          </button>
        ` : null}
        <button onClick=${() => { setPlayers(['Spieler 1', 'Spieler 2']); setScreen('setup'); }} style=${{background:C.surface2, color:C.text, padding:'15px', borderRadius:10, width:'100%', fontSize:18, border:`1px solid ${C.border}`}}>
          Neues Spiel starten
        </button>
      </div>
    `;
  }

  if (screen === 'setup') {
    return html`
      <div style=${{padding:20}}>
        <h2 style=${{color:C.amber, marginBottom:20}}>Neues Spiel</h2>
        <button onClick=${() => startGame(players)} style=${{background:C.green, color:'#fff', padding:'15px', borderRadius:10, width:'100%', fontSize:18, border:'none'}}>
          Starten
        </button>
      </div>
    `;
  }

  // --- GAME SCREEN ---
  const activePlayer = cur.players[cur.currentPlayerIdx];
  const nextPlayerIdx = (cur.currentPlayerIdx + 1) % cur.players.length;

  const handleTurn = (turnData) => {
    const newPlayers = [...cur.players];
    newPlayers[cur.currentPlayerIdx].turns.push(turnData);
    setCur({ ...cur, players: newPlayers, currentPlayerIdx: nextPlayerIdx });
  };

  const undoLastTurn = () => {
    const prevIdx = (cur.currentPlayerIdx - 1 + cur.players.length) % cur.players.length;
    const newPlayers = [...cur.players];
    if (newPlayers[prevIdx].turns.length > 0) {
      newPlayers[prevIdx].turns.pop();
      setCur({ ...cur, players: newPlayers, currentPlayerIdx: prevIdx });
    }
  };

  const abortGame = () => {
    if(confirm('Möchtest du das aktuelle Spiel wirklich abbrechen und löschen?')) {
      setCur(null);
      lsDel('tt:current');
      setScreen('home');
    }
  };

  return html`
    <div style=${{padding:20, display:'flex', flexDirection:'column', height:'100%'}}>
      <div style=${{display:'flex', justifyContent:'space-between', marginBottom:20}}>
        <button onClick=${() => setScreen('home')} style=${{background:'none', color:C.muted, border:'none', fontSize:14}}>Zurück</button>
        <div style=${{color:C.amber, fontWeight:'bold'}}>Ziel: 6000</div>
      </div>

      <div style=${{display:'flex', gap:10, overflowX:'auto', paddingBottom:10}}>
        ${cur.players.map((p, i) => html`
          <div key=${p.name} style=${{background: i === cur.currentPlayerIdx ? C.surface2 : 'transparent', border: i === cur.currentPlayerIdx ? `2px solid ${C.amber}` : `1px solid ${C.border}`, padding:'10px 15px', borderRadius:10, textAlign:'center', minWidth:100}}>
            <div style=${{fontSize:14, color: i === cur.currentPlayerIdx ? C.amber : C.text}}>${p.name}</div>
            <div style=${{fontSize:20, fontWeight:'bold'}}>${total(p)}</div>
          </div>
        `)}
      </div>

      <div style=${{flex:1, marginTop:20}}>
        <h3 style=${{marginBottom:15}}>Zug von ${activePlayer.name}</h3>
        <TurnManager onFinish=${handleTurn} />
      </div>

      <div style=${{marginTop:'auto', paddingTop:20, borderTop:`1px solid ${C.border}`, display:'flex', gap:10}}>
        <button onClick=${undoLastTurn} style=${{flex:1, background:C.surface2, color:C.text, border:`1px solid ${C.border}`, padding:12, borderRadius:8}}>↩ Letzten Zug löschen</button>
        <button onClick=${abortGame} style=${{flex:1, background:C.red, color:'#fff', border:'none', padding:12, borderRadius:8}}>✖ Spiel abbrechen</button>
      </div>
    </div>
  `;
}

function TurnManager({ onFinish }) {
  const [drawnCards, setDrawnCards] = useState([]);
  const [baseScoreStr, setBaseScoreStr] = useState('');
  const [bust, setBust] = useState(false);

  const drawCard = (cardId) => {
    setDrawnCards([...drawnCards, CARDS.find(c => c.id === cardId)]);
  };

  const finishTurn = (isTutto) => {
    if (bust) {
      onFinish({ cards: drawnCards.map(c=>c.id), score: 0, baseScore: 0, bonusScore: 0, bust: true, tuttoCycles: isTutto ? drawnCards.length : 0 });
      return;
    }

    const base = parseInt(baseScoreStr) || 0;
    let bonus = 0;
    let mult = 1;

    // Boni nur berechnen, wenn ein TUTTO geschafft wurde (außer Feuerwerk, da behält man Punkte immer)
    const lastCard = drawnCards[drawnCards.length - 1];
    const keepBonus = isTutto || lastCard?.id === 'feuerwerk';

    if (keepBonus) {
      drawnCards.forEach(c => {
        if (c.bonus) bonus += c.bonus;
        if (c.mult) mult *= c.mult;
      });
    }

    const totalScore = (base + bonus) * mult;
    onFinish({ 
      cards: drawnCards.map(c=>c.id), 
      score: totalScore, 
      baseScore: base, 
      bonusScore: (totalScore - base), 
      bust: false, 
      tuttoCycles: isTutto ? drawnCards.length : 0 
    });
  };

  if (drawnCards.length === 0) {
    return html`
      <div style=${{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
        ${CARDS.map(c => html`
          <button key=${c.id} onClick=${() => drawCard(c.id)} style=${{background:C.surface2, border:`1px solid ${c.color}`, color:C.text, padding:15, borderRadius:10, fontSize:16}}>
            ${c.emoji} ${c.label}
          </button>
        `)}
      </div>
    `;
  }

  const currentCard = drawnCards[drawnCards.length - 1];
  const canContinue = currentCard.id !== 'feuerwerk' && currentCard.id !== 'kleeblatt' && currentCard.id !== 'stop';

  return html`
    <div class="anim" style=${{background:C.surface2, padding:20, borderRadius:12}}>
      <div style=${{marginBottom:15}}>
        <div style=${{color:C.muted, fontSize:12}}>Gezogene Karten:</div>
        <div style=${{display:'flex', gap:5, flexWrap:'wrap', marginTop:5}}>
          ${drawnCards.map((c, i) => html`<span key=${i} style=${{background:c.color, color:'#fff', padding:'4px 8px', borderRadius:5, fontSize:12}}>${c.emoji} ${c.label}</span>`)}
        </div>
      </div>

      ${currentCard.id === 'stop' ? html`
        <div style=${{color:C.red, fontSize:20, fontWeight:'bold', textAlign:'center', margin:'20px 0'}}>🛑 Niete! (Zug vorbei)</div>
        <button onClick=${() => { setBust(true); finishTurn(false); }} style=${{width:'100%', background:C.red, color:'#fff', padding:15, borderRadius:10, border:'none', fontSize:16, fontWeight:'bold'}}>Zug beenden</button>
      ` : html`
        <div style=${{marginBottom:20}}>
          <label style=${{display:'block', marginBottom:8, color:C.amber}}>Erwürfelte Punkte (ohne Bonus):</label>
          <input type="number" placeholder="Z. B. 350" value=${baseScoreStr} onChange=${e => setBaseScoreStr(e.target.value)} style=${{width:'100%', padding:15, fontSize:20, borderRadius:10, border:`1px solid ${C.border}`, background:C.bg, color:C.text, textAlign:'center'}} />
        </div>

        <div style=${{display:'flex', gap:10, flexDirection:'column'}}>
          ${canContinue ? html`
            <button onClick=${() => { setBust(true); finishTurn(false); }} style=${{background:C.surface2, color:C.red, padding:12, borderRadius:8, border:`1px solid ${C.red}`}}>Niete gewürfelt (Bust)</button>
            <div style=${{display:'flex', gap:10}}>
              <button onClick=${() => finishTurn(false)} style=${{flex:1, background:C.surface, color:C.text, padding:15, borderRadius:10, border:`1px solid ${C.border}`}}>Aufhören</button>
              <button onClick=${() => finishTurn(true)} style=${{flex:1, background:C.amber, color:'#000', padding:15, borderRadius:10, border:'none', fontWeight:'bold'}}>TUTTO! (Aufhören)</button>
            </div>
            <div style=${{textAlign:'center', margin:'10px 0', color:C.muted}}>Oder nach Tutto weiterwürfeln:</div>
            <div style=${{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}}>
              ${CARDS.map(c => html`
                <button key=${c.id} onClick=${() => drawCard(c.id)} style=${{background:C.bg, border:`1px solid ${c.color}`, color:C.text, padding:10, borderRadius:8, fontSize:14}}>+ ${c.emoji} ${c.label}</button>
              `)}
            </div>
          ` : html`
             <button onClick=${() => finishTurn(currentCard.id === 'feuerwerk')} style=${{width:'100%', background:C.amber, color:'#000', padding:15, borderRadius:10, border:'none', fontSize:16, fontWeight:'bold'}}>Zug abschließen</button>
          `}
        </div>
      `}
    </div>
  `;
}

const root = createRoot(document.getElementById('root'));
root.render(html`<${App} />`);
</script>
</body>
</html>
