<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0e0900"/>
  <!-- Warm amber glow -->
  <rect x="40" y="40" width="432" height="432" rx="72" fill="#1c1200"/>

  <!-- Large die face (main) -->
  <rect x="60" y="120" width="220" height="220" rx="36" fill="#f59e0b"/>
  <!-- Die dots: 6-face pattern -->
  <circle cx="118" cy="178" r="18" fill="#0e0900"/>
  <circle cx="180" cy="178" r="18" fill="#0e0900"/>
  <circle cx="242" cy="178" r="18" fill="#0e0900"/>
  <circle cx="118" cy="230" r="18" fill="#0e0900"/>
  <circle cx="242" cy="230" r="18" fill="#0e0900"/>
  <circle cx="118" cy="282" r="18" fill="#0e0900"/>
  <circle cx="180" cy="282" r="18" fill="#0e0900"/>
  <circle cx="242" cy="282" r="18" fill="#0e0900"/>

  <!-- Second die (overlapping, rotated feel) -->
  <rect x="232" y="172" width="220" height="220" rx="36" fill="#ef4444"/>
  <!-- Die dots: 5-face -->
  <circle cx="290" cy="230" r="16" fill="#0e0900"/>
  <circle cx="392" cy="230" r="16" fill="#0e0900"/>
  <circle cx="341" cy="282" r="16" fill="#0e0900"/>
  <circle cx="290" cy="334" r="16" fill="#0e0900"/>
  <circle cx="392" cy="334" r="16" fill="#0e0900"/>

  <!-- TUTTO text -->
  <text x="256" y="468" font-family="'Arial Black', sans-serif" font-weight="900"
    font-size="72" fill="#fde68a" text-anchor="middle" letter-spacing="-2">TUTTO</text>
</svg>
